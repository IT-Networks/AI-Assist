# Enterprise Brainstorming Context Skill
# Erweitert /brainstorm mit Unternehmens-spezifischen Templates,
# Use Case Formaten und Multi-Source Recherche-Fähigkeiten.

id: enterprise-brainstorm
name: Enterprise Brainstorming Context
description: |
  Erweitert Brainstorming-Sessions mit Enterprise-Standards:
  - Strukturierte Use Cases
  - Stakeholder-Mapping
  - Kontext-Diagramme
  - Multi-Source Recherche (Web, Confluence, Handbuch)
version: "1.0"
type: hybrid

activation:
  mode: command-trigger
  trigger_commands:
    - brainstorm
  trigger_words:
    - brainstorm
    - ideenfindung
    - requirements

research:
  scope: external-safe
  allowed_sources:
    - skills
    - handbook
    - confluence
    - web
  sanitize_queries: true
  max_web_results: 5
  max_internal_results: 10

output:
  templates:
    - name: "Executive Summary"
      required: true
      format: "2-3 Sätze Zusammenfassung des Brainstormings"
      example: "Das Feature X ermöglicht... und adressiert die Anforderung Y."

    - name: "Use Cases"
      required: true
      format: |
        ### UC-{number}: {title}
        **Akteur:** {actor}
        **Auslöser:** {trigger}
        **Vorbedingung:** {precondition}
        **Ablauf:**
        1. {step1}
        2. {step2}
        3. {step3}
        **Ergebnis:** {result}
        **Priorität:** {high|medium|low}
      example: |
        ### UC-01: Benutzer meldet sich an
        **Akteur:** Endbenutzer
        **Auslöser:** Benutzer öffnet Anwendung
        **Vorbedingung:** Benutzer hat gültige Credentials
        **Ablauf:**
        1. Benutzer gibt Benutzername ein
        2. Benutzer gibt Passwort ein
        3. System validiert Credentials
        **Ergebnis:** Benutzer ist eingeloggt
        **Priorität:** high

    - name: "Stakeholder-Mapping"
      required: true
      format: |
        | Stakeholder | Rolle | Interesse | Einfluss |
        |-------------|-------|-----------|----------|
        | {name} | {role} | {interest} | {high/medium/low} |

    - name: "Risiken"
      required: true
      format: |
        - **Risiko:** {description}
          **Wahrscheinlichkeit:** {high/medium/low}
          **Auswirkung:** {high/medium/low}
          **Mitigation:** {strategy}

    - name: "Annahmen"
      required: true
      format: "- {assumption}"

    - name: "Offene Fragen"
      required: true
      format: "- [ ] {question}"

  diagrams:
    - type: context
      format: mermaid
      description: "Kontext-Diagramm als Mermaid Flowchart"
      template: |
        ```mermaid
        flowchart TD
            subgraph System["{SYSTEM_NAME}"]
                A["Komponente A"]
                B["Komponente B"]
                C["Komponente C"]
                A --> B
                B --> C
            end
            E1["Externes System 1"] --> System
            E2["Externes System 2"] --> System
            E3["Externes System 3"] --> System
        ```

    - type: usecase
      format: mermaid
      description: "Use-Case-Diagramm als Mermaid Flowchart"
      template: |
        ```mermaid
        flowchart LR
            A1["Akteur 1"] --> UC1["Use Case 1"]
            A1 --> UC2["Use Case 2"]
            A1 --> UC3["Use Case 3"]
            A2["Akteur 2"] --> UC3
            A2 --> UC4["Use Case 4"]
        ```

    - type: process
      format: mermaid
      description: "Prozess-/Ablaufdiagramm als Mermaid Flowchart"
      template: |
        ```mermaid
        flowchart TD
            Start["Start"] --> Step1["Schritt 1"]
            Step1 --> Decision{"Entscheidung?"}
            Decision -->|Ja| Step2["Schritt 2a"]
            Decision -->|Nein| Step3["Schritt 2b"]
            Step2 --> End["Ende"]
            Step3 --> End
        ```

  include_sources: true
  enterprise_formatting: true

system_prompt: |
  ## Brainstorming-Anweisungen (Enterprise Standard)

  Du erstellst strukturierte Brainstorming-Dokumente nach Unternehmensstandard.

  ### Unterstützte Flags
  - `--strategy systematic` - Systematische, schrittweise Exploration
  - `--strategy agile` - Schnelle, iterative Ideenfindung
  - `--strategy enterprise` - Vollständige Enterprise-Analyse mit Compliance
  - `--depth shallow` - Schneller Überblick (1-2 Use Cases)
  - `--depth normal` - Standard-Analyse (3-5 Use Cases)
  - `--depth deep` - Tiefgehende Analyse (5+ Use Cases mit Varianten)
  - `--ultrathink` - Maximale Tiefe: Alle Templates vollständig ausfüllen
  - `--parallel` - Parallele Exploration mehrerer Lösungsansätze

  ### Recherche-Strategie
  1. **Interne Quellen zuerst**: Suche in Skills, Handbuch und Confluence
  2. **Web für Best Practices**: Ergänze mit externen Quellen für Patterns
  3. **Datenschutz**: NIEMALS interne Service-Namen, Projekt-IDs oder
     Personen-Namen in Web-Queries verwenden

  ### Output-Anforderungen
  - **Mindestens 3 Use Cases** im vorgegebenen Format
  - **Diagramme als Mermaid** (werden im Frontend automatisch gerendert):
    - Kontext-Diagramm: `flowchart TD` mit Subgraphs fuer Systemgrenzen
    - Use-Case-Diagramm: `flowchart LR` mit Akteuren und Use Cases
    - Prozess-Diagramm: `flowchart TD` mit Entscheidungen und Schritten
    - IMMER in ```mermaid Code-Bloecken, NIEMALS als ASCII-Art
  - **Stakeholder-Tabelle** mit Einfluss-Bewertung (Markdown-Tabelle)
  - **Risiken und Annahmen** explizit auflisten
  - **Quellen-Angabe** am Ende des Dokuments

  ### Enterprise-Kontext
  - Architektur: Microservices mit Java/Spring Boot
  - Datenbank: DB2 als primäre Datenbank
  - Runtime: WebSphere Liberty
  - Security: OWASP Top 10 beachten
  - API-Design: REST mit OpenAPI 3.0

  ### Qualitätskriterien
  - Vollständige Use Cases (alle Felder ausgefüllt)
  - Realistische Stakeholder-Analyse
  - Quantifizierbare Risiken wo möglich
  - Konkrete, überprüfbare Annahmen

knowledge_sources: []

tools: []

metadata:
  author: Enterprise Architecture Team
  created: "2026-03-16"
  tags:
    - brainstorm
    - enterprise
