# Enterprise Design Context Skill
# Erweitert /design mit UML-Diagrammen, Sequenzdiagrammen,
# API-Spezifikationen und Enterprise-Architektur-Standards.

id: enterprise-design
name: Enterprise Design Context
description: |
  Erweitert Design-Sessions mit Enterprise-Standards:
  - Sequenzdiagramme (Mermaid)
  - Klassen-/Komponenten-Diagramme
  - ERD für Datenmodelle
  - OpenAPI-Spezifikationen
  - Entscheidungsprotokolle
version: "1.0"
type: hybrid

activation:
  mode: command-trigger
  trigger_commands:
    - design
  trigger_words:
    - design
    - architektur
    - architecture
    - api-design

research:
  scope: external-safe
  allowed_sources:
    - skills
    - handbook
    - confluence
    - web
  sanitize_queries: true
  max_web_results: 5
  max_internal_results: 10

output:
  templates:
    - name: "Design Overview"
      required: true
      format: "Kurze Beschreibung des Designs (2-3 Sätze)"

    - name: "Komponenten"
      required: true
      format: |
        ### {ComponentName}
        **Verantwortung:** {responsibility}
        **Schnittstellen:** {interfaces}
        **Abhängigkeiten:** {dependencies}
        **Technologie:** {tech_stack}

    - name: "API Specification"
      required: false
      format: |
        ```yaml
        openapi: 3.0.3
        info:
          title: {API_NAME}
          version: 1.0.0
        paths:
          /{resource}:
            get:
              summary: {description}
              responses:
                '200':
                  description: Erfolgreiche Antwort
        ```

    - name: "Datenmodell"
      required: false
      format: |
        ### Entity: {EntityName}
        | Feld | Typ | Beschreibung | Constraints |
        |------|-----|--------------|-------------|
        | {field} | {type} | {desc} | {constraints} |

    - name: "Entscheidungsprotokoll"
      required: true
      format: |
        | Entscheidung | Alternativen | Begründung |
        |--------------|--------------|------------|
        | {decision} | {alternatives} | {rationale} |

  diagrams:
    - type: sequence
      format: mermaid
      template: |
        ```mermaid
        sequenceDiagram
            participant C as Client
            participant A as API Gateway
            participant S as Service
            participant D as Database

            C->>A: HTTP Request
            A->>S: Forward Request
            S->>D: Query
            D-->>S: Result
            S-->>A: Response
            A-->>C: HTTP Response
        ```

    - type: class
      format: mermaid
      template: |
        ```mermaid
        classDiagram
            class Service {
                +process(request): Response
                -validate(data): boolean
            }
            class Repository {
                +findById(id): Entity
                +save(entity): Entity
            }
            class Entity {
                +id: String
                +createdAt: DateTime
            }
            Service --> Repository
            Repository --> Entity
        ```

    - type: component
      format: mermaid
      description: "Komponenten-Diagramm als Mermaid Flowchart mit Subgraphs"
      template: |
        ```mermaid
        flowchart TD
            subgraph Presentation["Presentation Layer"]
                C1["Controller A"]
                C2["Controller B"]
                C3["Controller C"]
            end
            subgraph Service["Service Layer"]
                S1["Service A"]
                S2["Service B"]
                S3["Service C"]
            end
            subgraph Persistence["Persistence Layer"]
                R1["Repository A"]
                R2["Repository B"]
                R3["Repository C"]
            end
            C1 --> S1
            C2 --> S2
            C3 --> S3
            S1 --> R1
            S2 --> R2
            S3 --> R3
        ```

    - type: erd
      format: mermaid
      description: "Entity-Relationship-Diagramm als Mermaid erDiagram"
      template: |
        ```mermaid
        erDiagram
            Entity1 ||--o{ Entity2 : "has"
            Entity1 {
                string id PK
                string name
                datetime created_at
            }
            Entity2 {
                string id PK
                string entity1_id FK
                string attribute
            }
            Entity3 }o--|| Entity1 : "belongs to"
            Entity3 {
                string id PK
                string attribute
            }
        ```

  include_sources: true
  enterprise_formatting: true

system_prompt: |
  ## Design-Anweisungen (Enterprise Standard)

  Du erstellst technische Designs nach Enterprise-Architektur-Standards.

  ### Unterstützte Flags
  - `--type architecture` - System-Architektur mit Komponenten-Übersicht
  - `--type api` - REST/GraphQL API-Design mit OpenAPI Spec
  - `--type component` - UI/Service-Komponenten-Design
  - `--type database` - Datenbank-Schema und ERD
  - `--format diagram` - Fokus auf Diagramme (Mermaid/ASCII)
  - `--format spec` - Fokus auf Spezifikationen (OpenAPI, Schema)
  - `--format code` - Code-Strukturen und Interfaces
  - `--format all` - Vollständiges Design-Dokument
  - `--ultrathink` - Maximale Tiefe mit allen Diagramm-Typen
  - `--constraints "..."` - Zusätzliche Constraints beachten

  ### Recherche-Strategie
  1. **Bestehende Services prüfen**: Confluence nach existierenden Implementierungen durchsuchen
  2. **Architektur-Patterns**: Interne Richtlinien für Patterns konsultieren
  3. **Best Practices**: Web-Recherche für aktuelle Technologie-Standards (anonymisiert)

  ### Pflicht-Diagramme
  Jedes Design MUSS mindestens enthalten (IMMER als ```mermaid Code-Bloecke):
  1. **Sequenzdiagramm** (Mermaid `sequenceDiagram`) - Hauptablauf der Interaktionen
  2. **Komponenten-Diagramm** (Mermaid `flowchart TD` mit Subgraphs) - Architektur-Uebersicht
  3. **ERD** (Mermaid `erDiagram`) - wenn Datenmodell relevant
  NIEMALS ASCII-Art verwenden — das Frontend rendert Mermaid-Bloecke automatisch als Grafiken.

  ### API-Design-Standards
  - **REST** mit OpenAPI 3.0 Spezifikation
  - **Versionierung**: URL-basiert (/v1/resource)
  - **Error-Responses**: RFC 7807 Problem Details
  - **Pagination**: Cursor-basiert für Listen
  - **Naming**: kebab-case für Pfade, camelCase für JSON

  ### Architektur-Prinzipien
  - **12-Factor App** Prinzipien befolgen
  - **Circuit Breaker** für externe Service-Calls
  - **Structured Logging** im JSON-Format
  - **Health-Endpoints**: /health (liveness), /ready (readiness)
  - **Idempotenz**: POST/PUT Operationen idempotent gestalten

  ### Datenbank-Design
  - **Normalisierung**: Mindestens 3NF
  - **Naming**: snake_case für Tabellen und Spalten
  - **Audit-Felder**: created_at, updated_at, created_by
  - **Soft-Delete**: deleted_at statt physischem Löschen

  ### Entscheidungsdokumentation
  Jede Architektur-Entscheidung muss dokumentiert werden:
  - Was wurde entschieden?
  - Welche Alternativen gab es?
  - Warum diese Entscheidung?

  ### Qualitätskriterien
  - Alle Komponenten haben klare Verantwortlichkeiten
  - Schnittstellen sind vollständig spezifiziert
  - Abhängigkeiten sind explizit dokumentiert
  - Skalierbarkeit ist berücksichtigt

