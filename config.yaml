llm:
  base_url: "http://internal-llm-gateway/v1"
  api_key: "none"
  default_model: "gptoss120b"
  timeout_seconds: 120
  max_tokens: 4096
  temperature: 0.2
  verify_ssl: false  # false für selbstsignierte Zertifikate (interne Server)
  streaming: true    # true für Token-Streaming bei Antworten
  # Modell-Aufteilung für Agent (optional)
  tool_model: "gptoss120b"     # Schnelles Modell für Tool-Aufrufe/Suche
  analysis_model: ""           # Großes Modell für finale Analyse (leer = default_model)
  # Phase-spezifische Temperature
  tool_temperature: 0.0        # Tool-Call-Phase deterministisch (Mistral-optimiert)
  analysis_temperature: 0.1    # Analyse-Phase: niedrig für präzise Faktenextraktion (0.0-0.2 empfohlen)

models:
  - id: "gptoss120b"
    display_name: "GPT OSS 120B"
  - id: "mistral-678b"
    display_name: "Mistral 678B"
  - id: "qwen-7b"
    display_name: "Qwen 7B (Schnell)"
  - id: "qwen-428b"
    display_name: "Qwen 428B"

java:
  # Mehrere Repos möglich - nur eines aktiv
  repos:
    - name: "Beispiel-Projekt"
      path: "/home/user/projects/my-java-app"
  active_repo: "Beispiel-Projekt"  # Name des aktiven Repos
  repo_path: "/home/user/projects/my-java-app"  # Legacy-Kompatibilität
  exclude_dirs:
    - "target"
    - ".git"
    - "node_modules"
    - ".idea"
    - ".mvn"
  max_file_size_kb: 500

confluence:
  base_url: "https://confluence.example.com"
  username: ""
  api_token: ""       # Atlassian Cloud: API-Token hier eintragen
  password: ""        # Atlassian Server/DC: Passwort hier (statt api_token)
  default_space: ""
  verify_ssl: false   # false für selbstsignierte Zertifikate (interne Server)

jira:
  enabled: false
  base_url: "https://jira.example.com"
  username: ""
  api_token: ""       # Atlassian Cloud: API-Token hier eintragen
  password: ""        # Atlassian Server/DC: Passwort hier (statt api_token)
  default_project: ""
  verify_ssl: false   # false für selbstsignierte Zertifikate (interne Server)

context:
  max_tokens: 32000
  max_file_context_kb: 100

uploads:
  directory: "./uploads"
  max_file_size_mb: 50
  cleanup_after_hours: 24

index:
  directory: "./index"          # Speicherort für SQLite FTS5-Indexe
  auto_build_on_start: false    # Java-Index beim App-Start automatisch aufbauen
  max_search_results: 5         # Anzahl relevanter Treffer pro Suche

python:
  repo_path: ""                 # PYTHON_REPO_PATH env var möglich
  exclude_dirs:
    - "__pycache__"
    - ".venv"
    - ".git"
    - "node_modules"
    - ".mypy_cache"
    - ".pytest_cache"
    - "dist"
    - "build"
  max_file_size_kb: 500

tools:
  flake8: "/root/.local/bin/flake8"
  ruff: "/root/.local/bin/ruff"
  mypy: "/root/.local/bin/mypy"
  pytest: "/root/.local/bin/pytest"

server:
  host: "0.0.0.0"
  port: 8000
  reload: false

# ═══════════════════════════════════════════════════════════════════
# NEUE FEATURES: AI-Assist Evolution
# ═══════════════════════════════════════════════════════════════════

# Handbuch-Integration (HTML auf Netzlaufwerk)
handbook:
  enabled: false                           # true um Handbuch zu aktivieren
  path: ""                                 # z.B. "//server/share/handbuch" oder "Z:/handbuch"
  index_on_start: false                    # Automatisch beim Start indexieren
  exclude_patterns:
    - "**/archiv/**"
    - "**/backup/**"
    - "**/.git/**"
  functions_subdir: "funktionen"           # Subordner für Service-Funktionen
  fields_subdir: "felder"                  # Subordner für Feld-Definitionen

# Skill-System
skills:
  enabled: true
  directory: "./skills"                    # Ordner für Skill-Definitionen (YAML)
  auto_activation: false                   # Automatische Aktivierung basierend auf Keywords
  max_active_skills: 5                     # Max. gleichzeitig aktive Skills

# Datei-Operationen (Read/Write/Edit wie Claude Code)
file_operations:
  enabled: false                           # true um Schreibzugriff zu erlauben
  default_mode: "read_only"                # read_only | write_with_confirm
  allowed_paths: []                        # Pfade in denen geschrieben werden darf
  allowed_extensions:
    - ".java"
    - ".py"
    - ".xml"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".md"
    - ".properties"
    - ".sql"
    - ".sqlj"
  denied_patterns:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/target/**"
    - "**/__pycache__/**"
  backup_enabled: true
  backup_directory: "./backups"

# DB2-Datenbankverbindung
database:
  enabled: false                           # true um DB-Abfragen zu aktivieren
  driver: "ibm_db"                         # ibm_db (native) oder jaydebeapi (JDBC)
  host: ""                                 # Hostname des DB2-Servers
  port: 50000                              # Standard DB2-Port
  database: ""                             # Datenbankname
  db_schema: ""                            # Standard-Schema (z.B. CREATOR bei z/OS)
  username: ""
  password: ""
  # Sicherheit
  require_confirmation: true               # Bestätigung vor jeder Query
  max_rows: 1000                           # Max. Zeilen pro Abfrage
  timeout_seconds: 30
  readonly: true                           # Nur SELECT erlaubt
  # Für JDBC (jaydebeapi)
  jdbc_driver_path: ""                     # Pfad zur db2jcc4.jar
  jdbc_driver_class: "com.ibm.db2.jcc.DB2Driver"

# ═══════════════════════════════════════════════════════════════════
# MCP (Model Context Protocol) - Lokale Implementation
# ═══════════════════════════════════════════════════════════════════
mcp:
  enabled: false                           # true um MCP zu aktivieren
  servers: []                              # Lokale MCP-Server (stdio-basiert)
    # Beispiel:
    # - id: "seq-thinking"
    #   name: "Sequential Thinking"
    #   description: "Strukturiertes Denken für komplexe Aufgaben"
    #   command: "python"
    #   args: ["-m", "mcp_server_seq"]
    #   timeout_seconds: 60
    #   auto_start: true
  # Sequential Thinking (lokale Implementation ohne externen Server)
  sequential_thinking_enabled: true        # Lokale Seq-Thinking Implementation
  max_thinking_steps: 10                   # Max. Denkschritte pro Anfrage
  thinking_timeout_seconds: 120
  # Automatische Aktivierung
  auto_activate_on_error: true             # Bei komplexen Fehlern
  auto_activate_on_planning: true          # Bei Planungsaufgaben
  min_complexity_score: 0.7                # Schwelle für Auto-Aktivierung (0.0-1.0)
  debug_logging: false
