# Knowledge Collector – Wissenserfassung aus Confluence, Handbuch etc.
knowledge_base:
  enabled: true
  path: "knowledge-base"              # Ordner für gesammelte Wissens-MDs
  max_crawl_depth: 3                  # Max. Tiefe Unterseiten-Traversierung
  max_pages_per_research: 30          # Budget: max. analysierte Seiten pro Research
  max_pdfs_per_research: 10           # Budget: max. analysierte PDFs pro Research
  max_parallel_agents: 5              # Parallele ResearchAgents
  synthesis_model: ""                 # LLM für Synthese (leer = default_model)
  auto_search: true                   # search_knowledge automatisch bei Fragen nutzen
  sources:                            # Welche Quellen aktiviert sind
    confluence: true                  # Confluence Wiki (wenn confluence.base_url gesetzt)
    handbook: true                    # Internes Handbuch (wenn handbook.enabled)

# Multi-Agent Team System (Feature-Flag: enabled=false zum Testen)
multi_agent:
  enabled: true                       # AKTIVIERT zum Testen
  coordinator_model: ""               # LLM fuer Task-Zerlegung (leer = default_model)
  max_concurrent_agents: 3            # Max parallele Agenten
  task_timeout_seconds: 120           # Timeout pro Task
  default_strategy: "dependency-first"
  teams:
    - name: "code-review-team"
      description: "Team fuer umfassende Code-Reviews mit Architektur-, Security- und Performance-Analyse"
      strategy: "dependency-first"
      max_parallel: 3
      agents:
        - name: "analyst"
          system_prompt: "Du analysierst Code-Struktur, Architektur und Design Patterns. Suche nach Klassen, Methoden und deren Beziehungen. Bewerte die Code-Qualitaet."
          tools: ["search_code", "read_file", "list_files", "glob_files", "grep_content"]
        - name: "security"
          system_prompt: "Du pruefst Code auf Sicherheitsluecken, OWASP-Risiken und unsichere Patterns. Suche nach SQL-Injection, XSS, fehlender Validierung und hartkodierten Credentials."
          tools: ["search_code", "read_file", "grep_content"]
        - name: "reviewer"
          system_prompt: "Du reviewst Code auf Korrektheit, Lesbarkeit und Best Practices. Fasse die Ergebnisse der anderen Agenten zusammen und erstelle Verbesserungsvorschlaege."
          tools: ["search_code", "read_file", "grep_content"]
    - name: "jira-review-team"
      description: "Team fuer Jira Code-Review Findings: liest Jira-Issues, prueft lokalen Branch, analysiert Code und schlaegt konkrete Fixes vor"
      strategy: "dependency-first"
      max_parallel: 2
      agents:
        - name: "jira-analyst"
          system_prompt: >
            Du bist der Jira-Analyst. Deine Aufgabe:
            1. Lies das Jira-Issue (Code-Review) mit read_jira_issue
            2. Extrahiere ALLE Findings/Bemerkungen aus der Beschreibung und den Kommentaren
            3. Pruefe mit git_status welcher Branch lokal ausgecheckt ist
            4. Vergleiche den Branch-Namen mit dem im Jira-Issue erwaenhnten Branch
            5. Melde ob der richtige Branch ausgecheckt ist (Warnung wenn nicht)
            6. Liste JEDES Finding einzeln auf mit: Datei, Zeile (wenn erwaehnt), Problem, Schwere
            Dein Ergebnis muss eine VOLLSTAENDIGE Liste aller Findings sein.
          tools: ["search_jira", "read_jira_issue", "git_status", "git_branch_list", "git_log"]
          max_turns: 8
        - name: "code-fixer"
          system_prompt: >
            Du bist der Code-Fixer. Du erhaeltst Findings aus einem Jira Code-Review.
            Fuer JEDES Finding:
            1. Finde die betroffene Datei und Stelle mit search_code/read_file/grep_content
            2. Verstehe den bestehenden Code und das Problem
            3. Schlage einen KONKRETEN Fix vor als Diff (alten Code → neuen Code)
            4. Erklaere WARUM der Fix das Problem loest
            Format pro Fix:
            **Finding:** [Beschreibung]
            **Datei:** `pfad/datei.py:zeile`
            **Problem:** [Was ist falsch]
            **Fix:**
            ```python
            # Vorher:
            alter_code()
            # Nachher:
            neuer_code()
            ```
            **Begruendung:** [Warum dieser Fix]
            WICHTIG: Du aenderst KEINE Dateien. Du schlägst nur Fixes VOR.
          tools: ["search_code", "read_file", "grep_content", "glob_files", "list_files", "git_diff"]
          max_turns: 15
        - name: "fix-reviewer"
          system_prompt: >
            Du bist der Fix-Reviewer. Du erhaeltst die Findings und vorgeschlagenen Fixes.
            Deine Aufgabe:
            1. Pruefe ob ALLE Findings aus dem Jira-Issue adressiert wurden
            2. Bewerte jeden Fix: Korrekt? Vollstaendig? Nebenwirkungen?
            3. Erstelle eine priorisierte Liste: Welche Fixes zuerst anwenden?
            4. Markiere Fixes die SICHER sind (rein kosmetisch, Typos) vs. RISKANT (Logik-Aenderungen)
            5. Erstelle ein Mermaid-Diagramm das die Abhaengigkeiten der Fixes zeigt
            Dein Ergebnis ist die finale Fix-Liste mit Empfehlung zur Reihenfolge.
          tools: ["search_code", "read_file"]
          max_turns: 10
    - name: "research-team"
      description: "Team fuer tiefe Recherche ueber Confluence, Handbuch und Code"
      strategy: "dependency-first"
      max_parallel: 3
      agents:
        - name: "wiki-researcher"
          system_prompt: "Du durchsuchst Confluence nach relevanter Dokumentation und extrahierst Fakten."
          tools: ["search_confluence", "read_confluence_page"]
        - name: "code-analyst"
          system_prompt: "Du analysierst den Quellcode und findest relevante Implementierungen."
          tools: ["search_code", "read_file", "grep_content"]
        - name: "synthesizer"
          system_prompt: "Du fasst die Ergebnisse der anderen Agenten zu einem kohaerenten Bericht zusammen."
          tools: ["search_knowledge"]

