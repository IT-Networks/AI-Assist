prompt_templates:
  enabled: true
  show_in_chat_header: true
  max_recent: 5
  templates:
  - id: code_search_class
    name: Klasse finden
    description: Suche nach einer Java/Python-Klasse im Code
    icon: search
    category: search
    prompt: 'Suche im Code nach der Klasse oder dem Service ''{{klassenname}}''. Zeige
      mir:

      1. Wo die Klasse definiert ist

      2. Die wichtigsten Methoden

      3. Abhängigkeiten und Verwendungen'
    placeholders:
    - klassenname
    is_builtin: true
    sort_order: 1
  - id: code_search_function
    name: Funktion/Methode finden
    description: Suche nach einer bestimmten Funktion oder Methode
    icon: search
    category: search
    prompt: 'Finde die Methode oder Funktion ''{{methodenname}}'' im Code. Zeige:

      1. Die vollständige Implementierung

      2. Wo sie aufgerufen wird

      3. Parameter und Rückgabewerte'
    placeholders:
    - methodenname
    is_builtin: true
    sort_order: 2
  - id: code_search_pattern
    name: Code-Muster suchen
    description: Suche nach einem bestimmten Code-Pattern
    icon: search
    category: search
    prompt: 'Suche im Code nach dem Muster ''{{suchmuster}}''. Filter: {{dateifilter}}.

      Zeige alle Fundstellen mit Kontext.'
    placeholders:
    - suchmuster
    - dateifilter
    is_builtin: true
    sort_order: 3
  - id: confluence_search
    name: Confluence durchsuchen
    description: Suche in der Confluence-Dokumentation
    icon: book
    category: search
    prompt: Durchsuche die Confluence-Dokumentation nach '{{suchbegriff}}'. Fasse
      die wichtigsten Ergebnisse zusammen und gib Links zu den relevanten Seiten.
    placeholders:
    - suchbegriff
    is_builtin: true
    sort_order: 10
  - id: confluence_service_doc
    name: Service-Doku finden
    description: Finde die Dokumentation zu einem Service
    icon: book
    category: search
    prompt: 'Finde die Confluence-Dokumentation zum Service ''{{servicename}}''. Zeige:

      1. Übersicht und Zweck

      2. API/Schnittstellen

      3. Konfiguration

      4. Bekannte Probleme'
    placeholders:
    - servicename
    is_builtin: true
    sort_order: 11
  - id: db_debug_table
    name: Tabelle analysieren
    description: Analysiere eine Datenbanktabelle
    icon: database
    category: debug
    prompt: 'Analysiere die Datenbanktabelle ''{{tabellenname}}'':

      1. Zeige die Struktur (Spalten, Typen, Keys)

      2. Führe aus: SELECT * FROM {{tabellenname}} WHERE {{bedingung}} FETCH FIRST
      20 ROWS ONLY

      3. Erkläre die Daten'
    placeholders:
    - tabellenname
    - bedingung
    is_builtin: true
    sort_order: 20
  - id: db_debug_query
    name: Query ausführen & erklären
    description: Führe eine SQL-Query aus und erkläre das Ergebnis
    icon: database
    category: debug
    prompt: 'Führe folgende SQL-Query aus und erkläre das Ergebnis:


      ```sql

      {{query}}

      ```


      Zeige:

      1. Das Ergebnis formatiert als Tabelle

      2. Auffälligkeiten in den Daten

      3. Mögliche Probleme'
    placeholders:
    - query
    is_builtin: true
    sort_order: 21
  - id: db_debug_trace
    name: Datensatz verfolgen
    description: Verfolge einen Datensatz durch mehrere Tabellen
    icon: database
    category: debug
    prompt: 'Verfolge den Datensatz mit {{schluesselfeld}} = ''{{wert}}'' durch die
      relevanten Tabellen.

      1. Zeige alle zugehörigen Einträge

      2. Erkläre die Beziehungen

      3. Finde eventuelle Inkonsistenzen'
    placeholders:
    - schluesselfeld
    - wert
    is_builtin: true
    sort_order: 22
  - id: analyze_error
    name: Fehler analysieren
    description: Analysiere einen Fehler oder eine Exception
    icon: bug
    category: debug
    prompt: 'Analysiere diesen Fehler:


      ```

      {{fehlermeldung}}

      ```


      1. Was ist die Ursache?

      2. Wo im Code tritt er auf?

      3. Wie kann er behoben werden?'
    placeholders:
    - fehlermeldung
    is_builtin: true
    sort_order: 30
  - id: analyze_log
    name: Log analysieren
    description: Analysiere Log-Einträge nach Problemen
    icon: file-text
    category: debug
    prompt: 'Analysiere diese Log-Einträge:


      ```

      {{loginhalt}}

      ```


      1. Finde Fehler und Warnungen

      2. Erkläre den Ablauf

      3. Identifiziere mögliche Probleme'
    placeholders:
    - loginhalt
    is_builtin: true
    sort_order: 31
  - id: codereview_findings
    name: Code Review bearbeiten
    description: Bearbeite Code Review Findings aus einem Jira-Ticket
    icon: bug
    category: review
    prompt: |
      Bearbeite die Code Review Findings aus dem Jira-Ticket.

      ## Aufgabe
      Lies das Jira **{{jira_key}}** mit allen Subtasks (jedes Finding ist ein Subtask) und bearbeite diese Schritt für Schritt im Repository **{{repo}}**.

      ## Workflow
      1. **Jira lesen**: `read_jira_issue(issue_key="{{jira_key}}", include_subtasks=true)`
      2. **Übersicht zeigen**: Liste alle Findings mit Status
      3. **Pro Finding**:
         - Subtask-Details lesen
         - Betroffene Datei(en) im Repo lesen
         - Fix erklären und bestätigen lassen
         - Änderung mit edit_file durchführen
      4. **Abschluss**: Zusammenfassung + Git-Commit-Vorschlag

      Starte jetzt mit dem Lesen des Jira-Tickets.
    placeholders:
    - jira_key
    - repo
    is_builtin: true
    sort_order: 40

access_logging:
  enabled: true
  log_directory: ''
  max_age_days: 90
  log_request_body: false
  log_response_body: false
  exclude_hosts: []

# Analytics - Tool-Nutzung und KI-Entscheidungen loggen
# ═══════════════════════════════════════════════════════════════════
# Task-Decomposition Agent System
# ═══════════════════════════════════════════════════════════════════
# Zerlegt komplexe Anfragen in spezialisierte Tasks
# Pipeline: PromptEnhancer → TaskPlanner → TaskExecutor
task_agents:
  enabled: true                        # Master-Switch für Task-Decomposition
  # Model-Zuweisung pro Agent-Typ (leer = Fallback auf Standard-Modelle)
  research_model: qwen-7b              # Für Research-Tasks
  code_model: ""                         # Leer = default_model (aus llm.default_model)
  analyst_model: mistral-678b          # Für Analyse-Tasks
  devops_model: qwen-7b                # Für DevOps-Tasks
  docs_model: qwen-7b                  # Für Doku-Tasks
  debug_model: mistral-678b            # Für Debug-Tasks
  planning_model: mistral-678b         # Model für TaskPlanner
  # Execution Settings
  max_parallel_tasks: 3                # Max. parallele Tasks
  task_timeout_seconds: 120            # Timeout pro Task
  max_retries_per_task: 2              # Max. Retries pro Task
  # Complexity Threshold
  min_tasks_for_decomposition: 2       # Mindestens 2 Tasks für Zerlegung
  # Phase Synthesis
  enable_phase_synthesis: true         # Zwischen-Synthese aktivieren
  synthesis_max_tokens: 500            # Max. Tokens für Synthese
  planning_temperature: 0.1            # Temperature für Planung
  # Enhancement Settings
  enhancement_confirm_mode: none       # "all" | "none" | "write_only"
  enhancement_always_confirm: []       # ["research", "sequential", "analyze"]
  research_internal_first: true        # Interne Quellen bevorzugen

analytics:
  enabled: true                    # Master-Switch für Analytics
  storage_path: ./data/analytics   # Speicherort für Logs
  retention_days: 90               # Aufbewahrungsdauer
  log_level: standard              # minimal | standard | detailed
  compress_after_days: 7           # GZIP nach X Tagen

# App-Update Service (GitHub-basiert)
# ═════════════════════════════════════════════════════════════════════
# Webex Messaging Integration
# ═════════════════════════════════════════════════════════════════════
webex:
  enabled: false
  # OAuth2 Integration (App auf developer.webex.com anlegen)
  client_id: ''                  # Integration Client-ID
  client_secret: ''              # Integration Client-Secret
  redirect_uri: 'http://localhost:8000/api/webex/oauth/callback'
  scopes: 'spark:rooms_read spark:messages_read spark:people_read'
  # Token (OAuth automatisch ODER manueller Bearer-Token)
  access_token: ''               # Manuell: Bearer-Token eintragen / OAuth: automatisch
  refresh_token: ''              # OAuth: automatisch (90 Tage)
  token_expires_at: ''           # OAuth: automatisch
  # Allgemein
  base_url: 'https://webexapis.com/v1'
  timeout_seconds: 30
  use_proxy: true                # Zentralen Proxy verwenden
  verify_ssl: false              # SSL-Zertifikate prüfen (false fuer Corporate Proxy)
  polling_enabled: false         # Automatisches Polling für Todo-Erkennung
  polling_interval_minutes: 5    # Intervall 1-60 Minuten
  max_messages_per_poll: 100

# Exchange E-Mail Integration (EWS mit NTLM)
# ═════════════════════════════════════════════════════════════════════
email:
  enabled: false
  ews_url: ''                      # z.B. mail.example.com/EWS/Exchange.asmx
  smtp_address: ''                 # E-Mail-Adresse des Postfachs
  domain: ''                       # NTLM-Domain (z.B. FIRMA)
  credential_ref: ''               # Zentrale Credentials (bevorzugt, username=DOMAIN\user)
  username: ''                     # Direkt: NTLM-Benutzername (ohne Domain-Prefix)
  password: ''                     # Direkt-Passwort (Fallback)
  verify_ssl: true
  timeout_seconds: 30
  polling_enabled: false           # Automatisches Polling für Todo-Erkennung
  polling_interval_minutes: 5      # Intervall 1-60 Minuten
  max_emails_per_poll: 50

update:
  enabled: false
  repo_url: ''                    # z.B. https://github.com/user/ai-assist-releases
  github_token: ''                # Personal Access Token für private Repos
  use_proxy: true                 # Proxy aus search-Konfiguration verwenden
  verify_ssl: false               # SSL-Zertifikate prüfen
  check_on_start: false           # Beim Start nach Updates suchen

# Python Script Execution Settings
# ═════════════════════════════════════════════════════════════════════
script_execution:
  enabled: true
  scripts_directory: ./scripts
  max_scripts: 100
  max_script_size_kb: 100
  max_total_size_mb: 50
  cleanup_days: 30
  require_confirmation: true
  use_container: false  # Docker sandbox nicht implementiert - lokal ausführen
  timeout_seconds: 120  # Erhöht von 30s für win32com/COM-Operationen die 20-60+ Sekunden benötigen
  max_output_size_kb: 512  # Erhöht von 256 für ausführlichere Fehlermeldungen
  
  # Dateisystem-Zugriff
  allowed_file_paths: []  # Pfade wo Scripts schreiben dürfen (leer = kein Zugriff)
  
  # Code-Imports (für 'import X' Statements)
  # HINWEIS: Diese Liste kann über die Settings-UI angepasst werden!
  allowed_imports:
    # Standard Library (sicher)
    - sys
    - json
    - csv
    - pathlib
    - re
    - datetime
    - collections
    - itertools
    - functools
    - math
    - statistics
    - typing
    - dataclasses
    - enum
    - copy
    - io
    - base64
    - hashlib
    - uuid
    - random
    - string
    - textwrap
    - difflib
    - decimal
    - fractions
    - operator
    - contextlib
    - abc
    - struct
    # Data Processing
    - pandas
    - numpy
    - yaml
    - xml
    - html
    - pprint
    # Document Processing
    - docx2pdf
    # Windows COM (for Office automation)
    - win32com
  
  # Verbotene Patterns in Code
  blocked_patterns:
    - subprocess
    - os\.system
    - os\.popen
    - os\.exec
    - eval\s*\(
    - exec\s*\(
    - __import__
    - compile\s*\(
    - open\s*\([^)]*['\"][wa]
    - shutil\.rmtree
    - shutil\.move
    - socket\.
    - urllib\.request
    - http\.client
    - importlib
    - builtins
    - globals\s*\(
    - locals\s*\(
    - getattr\s*\(
    - setattr\s*\(
    - delattr\s*\(
  
  # pip-Pakete (für 'pip install X')
  # HINWEIS: Diese Liste kann über die Settings-UI angepasst werden!
  pip_allowed_packages:
    # Data Processing
    - pandas
    - numpy
    - scipy
    - scikit-learn
    # Excel/CSV
    - openpyxl
    - xlrd
    - xlwt
    - pyexcel
    - xlsxwriter
    # Web/HTTP
    - requests
    - httpx
    - aiohttp
    # Data Serialization
    - pyyaml
    - toml
    - msgpack
    # Web Scraping
    - beautifulsoup4
    - selenium
    - scrapy
    # Encryption
    - cryptography
    - pycryptodome
    # Date/Time
    - python-dateutil
    - pytz
    # Image Processing
    - pillow
    - opencv-python
    # XML/JSON
    - lxml
    - defusedxml
    # Utilities
    - click
    - colorama
    - tabulate
    - tqdm
    - sympy
    - statsmodels
    # Document Processing
    - docx2pdf
    - python-pptx
  
  # Nexus pip Repository
  pip_install_enabled: true
  pip_index_url: 'https://pypi.org/simple/'
  pip_trusted_host: 'pypi.org'
  pip_install_timeout_seconds: 60
  pip_cache_requirements: true
  pip_cache_dir: ./scripts/.pip_cache
