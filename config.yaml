  exclude_patterns:
  - '**/archiv/**'
  - '**/backup/**'
  - '**/.git/**'
  # Struktur-Modus: auto | directory | flat
  # auto: Erkennt automatisch ob Unterordner existieren
  # directory: Erwartet funktionen/SERVICE_NAME/tab.htm
  # flat: Erwartet FUNKTIONSNAME_tabname.htm (alle Dateien flach)
  structure_mode: auto
