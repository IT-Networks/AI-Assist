# LLM-Verbindung (OpenAI-kompatibler Endpunkt)
llm:
  base_url: http://internal-llm-gateway/v1
  api_key: none
  default_model: gptoss120b
  timeout_seconds: 120
  max_tokens: 4096
  temperature: 0.2
  verify_ssl: false
  streaming: true
  tool_model: qwen-7b
  analysis_model: mistral-678b
  tool_models:
    search_code: qwen-7b
    list_files: qwen-7b
    read_file: qwen-7b
    search_handbook: qwen-7b
    write_file: mistral-678b
    edit_file: mistral-678b
    github_pr_diff: mistral-678b
    github_commit_diff: mistral-678b
  tool_temperature: 0.0
  analysis_temperature: 0.2

# Verfügbare Modelle
models:
- id: gptoss120b
  display_name: GPT OSS 120B
- id: mistral-678b
  display_name: Mistral 678B
- id: qwen-7b
  display_name: Qwen 7B (Schnell)
- id: qwen-428b
  display_name: Qwen 428B

# Java-Repository
java:
  repo_path: /home/user/projects/my-java-app
  repos:
  - name: Beispiel-Projekt
    path: /home/user/projects/my-java-app
  active_repo: Beispiel-Projekt
  exclude_dirs:
  - target
  - build
  - out
  - bin
  - classes
  - .git
  - .svn
  - .idea
  - .settings
  - .project
  - .classpath
  - .vscode
  - .mvn
  - .gradle
  - gradle
  - node_modules
  - logs
  - tmp
  max_file_size_kb: 500

# Python-Repository
python:
  repo_path: ''
  repos: []
  active_repo: ''
  exclude_dirs:
  - __pycache__
  - .venv
  - .git
  - node_modules
  - .mypy_cache
  - .pytest_cache
  - dist
  - build
  max_file_size_kb: 500

# Tool-Pfade (Linux/Docker)
tools:
  flake8: /root/.local/bin/flake8
  ruff: /root/.local/bin/ruff
  mypy: /root/.local/bin/mypy
  pytest: /root/.local/bin/pytest

# Confluence-Verbindung
confluence:
  base_url: https://confluence.example.com
  username: ''
  api_token: ''
  password: ''
  default_space: ''
  verify_ssl: false
  api_path: ''

# Kontext-Limits
context:
  max_tokens: 64000
  max_file_context_kb: 200

# Upload-Einstellungen
uploads:
  directory: ./uploads
  max_file_size_mb: 50
  cleanup_after_hours: 24

# Server-Konfiguration
server:
  host: 0.0.0.0
  port: 8000
  reload: false
  chats_directory: ./chats

# Such-Index (SQLite FTS5)
index:
  directory: ./index
  auto_build_on_start: false
  max_search_results: 5


# ═══════════════════════════════════════════════════════════════════
# Handbuch-Integration (HTML auf Netzlaufwerk)
handbook:
  enabled: false
  path: ''
  index_on_start: false
  exclude_patterns:
  - '**/archiv/**'
  - '**/backup/**'
  - '**/.git/**'
  functions_subdir: funktionen
  fields_subdir: felder

# DB2-Datenbankverbindung
database:
  enabled: false
  driver: ibm_db
  host: ''
  port: 50000
  database: ''
  db_schema: ''
  username: ''
  password: ''
  require_confirmation: true
  max_rows: 1000
  timeout_seconds: 30
  readonly: true
  jdbc_driver_path: ''
  jdbc_driver_class: com.ibm.db2.jcc.DB2Driver

jira:
  enabled: false
  base_url: https://jira.example.com
  username: ''
  api_token: ''
  password: ''
  default_project: ''
  verify_ssl: false

# Skill-System
skills:
  enabled: true
  directory: ./skills
  auto_activation: false
  max_active_skills: 5

# Datei-Operationen (Read/Write/Edit wie Claude Code)
file_operations:
  enabled: false
  default_mode: read_only
  allowed_paths: []
  allowed_extensions:
  - .java
  - .sqlj
  - .jspx
  - .jsp
  - .xml
  - .yaml
  - .yml
  - .json
  - .properties
  - .cfg
  - .conf
  - .gradle
  - .kts
  - .html
  - .htm
  - .css
  - .js
  - .ts
  - .sql
  - .ddl
  - .md
  - .txt
  - .adoc
  - .py
  - .sh
  - .bat
  - .cmd
  denied_patterns:
  - '**/node_modules/**'
  - '**/target/**'
  - '**/build/**'
  - '**/out/**'
  - '**/bin/**'
  - '**/__pycache__/**'
  - '**/.gradle/**'
  - '**/.git/**'
  - '**/.svn/**'
  - '**/.idea/**'
  - '**/.settings/**'
  - '**/.vscode/**'
  - '**/logs/**'
  - '**/tmp/**'
  - '**/*.log'
  - '**/*.key'
  - '**/*.pem'
  - '**/*.jks'
  - '**/secrets/**'
  backup_enabled: true
  backup_directory: ./backups

data_sources:
  sources: []

sub_agents:
  enabled: true
  timeout_seconds: 120
  max_iterations: 15
  min_query_length: 10
  routing_model: qwen-7b
  agents:
  - code_explorer
  - wiki_agent
  - knowledge_agent
  - datasource_agent

mq:
  enabled: false
  queues: []

test_tool:
  enabled: false
  stages: []
  services: []
  active_stage: ''
  default_timeout_seconds: 60
  local_wlp_url: ''

log_servers:
  enabled: false
  stages: []
  default_tail_lines: 500

wlp:
  enabled: false
  servers:
  - id: local-dev
    name: Lokaler Entwicklungsserver
    description: WLP für lokale Entwicklung und Tests
    wlp_path: ''
    server_name: defaultServer
    start_timeout_seconds: 300
    extra_jvm_args: ''
  repo_path: ''
  java_home: ''

maven:
  enabled: false
  mvn_executable: mvn
  java_home: ''
  settings_file: ''
  local_repo: ''
  builds:
  - id: full-build
    name: Vollständiger Build
    description: Clean + Install mit allen Tests
    pom_path: ''
    goals: clean install
    profiles: []
    skip_tests: false
    jvm_args: -Xmx1024m
    extra_args: ''
  - id: quick-build
    name: Schneller Build
    description: Compile ohne Tests (für schnelle Iterationen)
    pom_path: ''
    goals: clean compile
    profiles: []
    skip_tests: true
    jvm_args: -Xmx512m
    extra_args: ''
  - id: package-only
    name: Nur Paketieren
    description: Package ohne Clean (für Deployment)
    pom_path: ''
    goals: package
    profiles: []
    skip_tests: true
    jvm_args: -Xmx1024m
    extra_args: -Dmaven.test.skip=true
  default_timeout_minutes: 15

search:
  enabled: false
  proxy_url: ''
  proxy_username: ''
  proxy_password: ''
  no_proxy: ''
  verify_ssl: true
  timeout_seconds: 30


# ═══════════════════════════════════════════════════════════════════
# Jenkins CI/CD (intern gehostet)
jenkins:
  enabled: false
  base_url: ''
  username: ''
  api_token: ''
  verify_ssl: false
  job_paths: []
  default_job_path: ''
  job_filter: ''
  timeout_seconds: 30
  require_build_confirmation: true

# GitHub Enterprise Server (intern gehostet)
github:
  enabled: false
  base_url: ''
  token: ''
  verify_ssl: false
  default_org: ''
  default_repo: ''
  timeout_seconds: 30
  max_items: 50
  pr_state_filter: open
  issue_state_filter: open

# Internal Fetch (Intranet-URLs abrufen)
internal_fetch:
  enabled: false
  base_urls: []
  verify_ssl: true
  timeout_seconds: 30
  auth_type: none
  auth_username: ''
  auth_password: ''
  auth_token: ''
  proxy_url: ''
  proxy_username: ''
  proxy_password: ''
  html_processing:
    enabled: true
    default_extract_mode: text
    max_output_length: 30000
    chunk_size: 8000
    chunk_overlap: 200
    remove_navigation: true
    remove_selectors:
    - script
    - style
    - nav
    - footer
    - .sidebar
    - .advertisement
    - .ad
    - '#cookie-banner'
    - '#cookie-consent'
    preserve_selectors: []

# Container Sandbox (Docker/Podman) - Sichere Code-Ausführung
docker_sandbox:
  enabled: true
  backend: podman
  docker_path: ''
  podman_path: C:/Program Files/RedHat/Podman/podman.exe
  image: python:3.11-slim
  custom_image: ''
  memory_limit: 512m
  cpu_limit: 1.0
  timeout_seconds: 60
  max_output_bytes: 131072
  network_enabled: true
  session_enabled: true
  session_timeout_minutes: 30
  max_sessions: 5
  file_upload_enabled: true
  max_upload_size_mb: 10
  upload_directory: ./sandbox_uploads
  preinstalled_packages:
  - requests
  - pandas
  - numpy
  - cryptography
  - beautifulsoup4
  - lxml
  - pillow
  - pyyaml
  - python-dateutil
  - chardet
  read_only_filesystem: false
  drop_capabilities: true

mcp:
  enabled: false
  servers: []
  sequential_thinking_enabled: true
  max_thinking_steps: 15
  thinking_timeout_seconds: 180
  auto_activate_on_error: true
  auto_activate_on_planning: true
  min_complexity_score: 0.7
  debug_logging: false

api_tools:
  enabled: true
  soap:
    default_timeout: 30
    cache_wsdl: true
    cache_ttl_minutes: 60
    verify_ssl: false
  rest:
    default_timeout: 30
    auto_format_response: true
    max_response_size_kb: 500
    verify_ssl: false

compile_tool:
  enabled: true
  default_changed_only: true
  default_fix: false
  default_strict: false
  timeout_per_file_seconds: 30
  total_timeout_seconds: 300
  python:
    enabled: true
    linter: ruff
    type_checker: none
    auto_fix_tool: ruff
    ignore_rules: []
  java:
    enabled: true
    mode: quick
    java_home: ''
    javac_options: -Xlint:all
  sql:
    enabled: true
    dialect: db2
    check_best_practices: true
  sqlj:
    enabled: true
    sqlj_path: ''
  xml:
    enabled: true
    validate_schemas: true
  config:
    enabled: true
    formats:
    - yaml
    - json
    - properties
    - toml

junit_tool:
  enabled: true
  default_version: '5'
  default_style: auto
  test_suffix: Test
  generate_negative_tests: true
  generate_edge_cases: true
  use_given_when_then: true
  add_todo_comments: true

prompt_templates:
  enabled: true
  show_in_chat_header: true
  max_recent: 5
  templates:
  - id: code_search_class
    name: Klasse finden
    description: Suche nach einer Java/Python-Klasse im Code
    icon: search
    category: search
    prompt: 'Suche im Code nach der Klasse oder dem Service ''{{klassenname}}''. Zeige
      mir:

      1. Wo die Klasse definiert ist

      2. Die wichtigsten Methoden

      3. Abhängigkeiten und Verwendungen'
    placeholders:
    - klassenname
    is_builtin: true
    sort_order: 1
  - id: code_search_function
    name: Funktion/Methode finden
    description: Suche nach einer bestimmten Funktion oder Methode
    icon: search
    category: search
    prompt: 'Finde die Methode oder Funktion ''{{methodenname}}'' im Code. Zeige:

      1. Die vollständige Implementierung

      2. Wo sie aufgerufen wird

      3. Parameter und Rückgabewerte'
    placeholders:
    - methodenname
    is_builtin: true
    sort_order: 2
  - id: code_search_pattern
    name: Code-Muster suchen
    description: Suche nach einem bestimmten Code-Pattern
    icon: search
    category: search
    prompt: 'Suche im Code nach dem Muster ''{{suchmuster}}''. Filter: {{dateifilter}}.

      Zeige alle Fundstellen mit Kontext.'
    placeholders:
    - suchmuster
    - dateifilter
    is_builtin: true
    sort_order: 3
  - id: confluence_search
    name: Confluence durchsuchen
    description: Suche in der Confluence-Dokumentation
    icon: book
    category: search
    prompt: Durchsuche die Confluence-Dokumentation nach '{{suchbegriff}}'. Fasse
      die wichtigsten Ergebnisse zusammen und gib Links zu den relevanten Seiten.
    placeholders:
    - suchbegriff
    is_builtin: true
    sort_order: 10
  - id: confluence_service_doc
    name: Service-Doku finden
    description: Finde die Dokumentation zu einem Service
    icon: book
    category: search
    prompt: 'Finde die Confluence-Dokumentation zum Service ''{{servicename}}''. Zeige:

      1. Übersicht und Zweck

      2. API/Schnittstellen

      3. Konfiguration

      4. Bekannte Probleme'
    placeholders:
    - servicename
    is_builtin: true
    sort_order: 11
  - id: db_debug_table
    name: Tabelle analysieren
    description: Analysiere eine Datenbanktabelle
    icon: database
    category: debug
    prompt: 'Analysiere die Datenbanktabelle ''{{tabellenname}}'':

      1. Zeige die Struktur (Spalten, Typen, Keys)

      2. Führe aus: SELECT * FROM {{tabellenname}} WHERE {{bedingung}} FETCH FIRST
      20 ROWS ONLY

      3. Erkläre die Daten'
    placeholders:
    - tabellenname
    - bedingung
    is_builtin: true
    sort_order: 20
  - id: db_debug_query
    name: Query ausführen & erklären
    description: Führe eine SQL-Query aus und erkläre das Ergebnis
    icon: database
    category: debug
    prompt: 'Führe folgende SQL-Query aus und erkläre das Ergebnis:


      ```sql

      {{query}}

      ```


      Zeige:

      1. Das Ergebnis formatiert als Tabelle

      2. Auffälligkeiten in den Daten

      3. Mögliche Probleme'
    placeholders:
    - query
    is_builtin: true
    sort_order: 21
  - id: db_debug_trace
    name: Datensatz verfolgen
    description: Verfolge einen Datensatz durch mehrere Tabellen
    icon: database
    category: debug
    prompt: 'Verfolge den Datensatz mit {{schluesselfeld}} = ''{{wert}}'' durch die
      relevanten Tabellen.

      1. Zeige alle zugehörigen Einträge

      2. Erkläre die Beziehungen

      3. Finde eventuelle Inkonsistenzen'
    placeholders:
    - schluesselfeld
    - wert
    is_builtin: true
    sort_order: 22
  - id: analyze_error
    name: Fehler analysieren
    description: Analysiere einen Fehler oder eine Exception
    icon: bug
    category: debug
    prompt: 'Analysiere diesen Fehler:


      ```

      {{fehlermeldung}}

      ```


      1. Was ist die Ursache?

      2. Wo im Code tritt er auf?

      3. Wie kann er behoben werden?'
    placeholders:
    - fehlermeldung
    is_builtin: true
    sort_order: 30
  - id: analyze_log
    name: Log analysieren
    description: Analysiere Log-Einträge nach Problemen
    icon: file-text
    category: debug
    prompt: 'Analysiere diese Log-Einträge:


      ```

      {{loginhalt}}

      ```


      1. Finde Fehler und Warnungen

      2. Erkläre den Ablauf

      3. Identifiziere mögliche Probleme'
    placeholders:
    - loginhalt
    is_builtin: true
    sort_order: 31

access_logging:
  enabled: true
  log_directory: ''
  max_age_days: 90
  log_request_body: false
  log_response_body: false
  exclude_hosts: []
