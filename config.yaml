    sort_order: 40

access_logging:
  enabled: true
  log_directory: ''
  max_age_days: 90
  log_request_body: false
  log_response_body: false
  exclude_hosts: []

# Analytics - Tool-Nutzung und KI-Entscheidungen loggen
# ═══════════════════════════════════════════════════════════════════
# Task-Decomposition Agent System
# ═══════════════════════════════════════════════════════════════════
# Zerlegt komplexe Anfragen in spezialisierte Tasks
# Pipeline: PromptEnhancer → TaskPlanner → TaskExecutor
task_agents:
  enabled: true                        # Master-Switch für Task-Decomposition
  # Model-Zuweisung pro Agent-Typ (leer = Fallback auf Standard-Modelle)
  research_model: qwen-7b              # Für Research-Tasks
  code_model: gptoss120b               # Für Code-Tasks
  analyst_model: mistral-678b          # Für Analyse-Tasks
  devops_model: qwen-7b                # Für DevOps-Tasks
  docs_model: qwen-7b                  # Für Doku-Tasks
  debug_model: mistral-678b            # Für Debug-Tasks
  planning_model: mistral-678b         # Model für TaskPlanner
  # Execution Settings
  max_parallel_tasks: 3                # Max. parallele Tasks
  task_timeout_seconds: 120            # Timeout pro Task
  max_retries_per_task: 2              # Max. Retries pro Task
  # Complexity Threshold
  min_tasks_for_decomposition: 2       # Mindestens 2 Tasks für Zerlegung
  # Phase Synthesis
  enable_phase_synthesis: true         # Zwischen-Synthese aktivieren
  synthesis_max_tokens: 500            # Max. Tokens für Synthese
  planning_temperature: 0.1            # Temperature für Planung
  # Enhancement Settings
  enhancement_confirm_mode: none       # "all" | "none" | "write_only"
  enhancement_always_confirm: []       # ["research", "sequential", "analyze"]
  research_internal_first: true        # Interne Quellen bevorzugen

analytics:
  enabled: true                    # Master-Switch für Analytics
  storage_path: ./data/analytics   # Speicherort für Logs
  retention_days: 90               # Aufbewahrungsdauer
  log_level: standard              # minimal | standard | detailed
  compress_after_days: 7           # GZIP nach X Tagen

# App-Update Service (GitHub-basiert)
update:
  enabled: false
  repo_url: ''                    # z.B. https://github.com/user/ai-assist-releases
  github_token: ''                # Personal Access Token für private Repos
  use_proxy: true                 # Proxy aus search-Konfiguration verwenden
  verify_ssl: false               # SSL-Zertifikate prüfen
  check_on_start: false           # Beim Start nach Updates suchen

# Python Script Execution Settings
# ═════════════════════════════════════════════════════════════════════
script_execution:
  enabled: true
  scripts_directory: ./scripts
  max_scripts: 100
  max_script_size_kb: 100
  max_total_size_mb: 50
  cleanup_days: 30
  require_confirmation: true
  use_container: false  # Docker sandbox nicht implementiert - lokal ausführen
  timeout_seconds: 120  # Erhöht von 30s für win32com/COM-Operationen die 20-60+ Sekunden benötigen
  max_output_size_kb: 512  # Erhöht von 256 für ausführlichere Fehlermeldungen
  
  # Dateisystem-Zugriff
  allowed_file_paths: []  # Pfade wo Scripts schreiben dürfen (leer = kein Zugriff)
  
  # Code-Imports (für 'import X' Statements)
  # HINWEIS: Diese Liste kann über die Settings-UI angepasst werden!
  allowed_imports:
    # Standard Library (sicher)
    - sys
    - json
    - csv
    - pathlib
    - re
    - datetime
    - collections
    - itertools
    - functools
    - math
    - statistics
    - typing
    - dataclasses
    - enum
    - copy
    - io
    - base64
    - hashlib
    - uuid
    - random
    - string
    - textwrap
    - difflib
    - decimal
    - fractions
    - operator
    - contextlib
    - abc
    - struct
    # Data Processing
    - pandas
    - numpy
    - yaml
    - xml
    - html
    - pprint
    # Document Processing
    - docx2pdf
    # Windows COM (for Office automation)
    - win32com
  
  # Verbotene Patterns in Code
  blocked_patterns:
    - subprocess
    - os\.system
    - os\.popen
    - os\.exec
    - eval\s*\(
    - exec\s*\(
    - __import__
    - compile\s*\(
    - open\s*\([^)]*['\"][wa]
    - shutil\.rmtree
    - shutil\.move
    - socket\.
    - urllib\.request
    - http\.client
    - importlib
    - builtins
    - globals\s*\(
    - locals\s*\(
    - getattr\s*\(
    - setattr\s*\(
    - delattr\s*\(
  
  # pip-Pakete (für 'pip install X')
  # HINWEIS: Diese Liste kann über die Settings-UI angepasst werden!
  pip_allowed_packages:
    # Data Processing
    - pandas
    - numpy
    - scipy
    - scikit-learn
    # Excel/CSV
    - openpyxl
    - xlrd
    - xlwt
    - pyexcel
    - xlsxwriter
    # Web/HTTP
    - requests
    - httpx
    - aiohttp
    # Data Serialization
    - pyyaml
    - toml
    - msgpack
    # Web Scraping
    - beautifulsoup4
    - selenium
    - scrapy
    # Encryption
    - cryptography
    - pycryptodome
    # Date/Time
    - python-dateutil
    - pytz
    # Image Processing
    - pillow
    - opencv-python
    # XML/JSON
    - lxml
    - defusedxml
    # Utilities
    - click
    - colorama
    - tabulate
    - tqdm
    - sympy
    - statsmodels
    # Document Processing
    - docx2pdf
    - python-pptx
  
  # Nexus pip Repository
  pip_install_enabled: true
  pip_index_url: 'https://pypi.org/simple/'
  pip_trusted_host: 'pypi.org'
  pip_install_timeout_seconds: 60
  pip_cache_requirements: true
  pip_cache_dir: ./scripts/.pip_cache
