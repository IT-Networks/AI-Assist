# Globale Proxy-Konfiguration (für alle externen HTTP-Verbindungen)
proxy:
  enabled: false
  url: ''                # z.B. http://proxy.intern:8080
  username: ''
  password: ''
  no_proxy: ''           # Kommagetrennte Liste ohne Proxy, z.B. "localhost,127.0.0.1,.intern"
  verify_ssl: true

# ═══════════════════════════════════════════════════════════════════
# LLM-Verbindung (OpenAI-kompatibler Endpunkt)
# ═══════════════════════════════════════════════════════════════════
# SETUP für LLM-Test-Proxy:
#   1. LLM-Test-Proxy starten: cd ../LLM-Test-Proxy && uvicorn app.main:app --port 8080
#   2. AI-Assist starten:      cd AI-Assist && uvicorn app.main:app --port 8000
#   3. Dashboard:              http://localhost:8080/dashboard
#
# Der Proxy mappt AI-Assist Modelle auf OpenAI (siehe LLM-Test-Proxy/config.yaml):
#   gpt-oss-120b   → gpt-4o-mini
#   mistral-678b → gpt-4o-mini
#   qwen-7b      → gpt-4o-mini
# ═══════════════════════════════════════════════════════════════════
llm:
  base_url: http://localhost:8080/v1  # LLM-Test-Proxy (Port 8080) → OpenAI
  api_key: none  # Proxy verwendet eigenen OpenAI Key aus .env
  default_model: gpt-oss-120b
  timeout_seconds: 120
  max_tokens: 4096
  temperature: 0.2
  verify_ssl: false
  streaming: true
  tool_model: qwen-7b
  analysis_model: mistral-678b
  tool_models:
    search_code: qwen-7b
    list_files: qwen-7b
    read_file: qwen-7b
    search_handbook: qwen-7b
    write_file: mistral-678b
    edit_file: mistral-678b
    github_pr_diff: mistral-678b
    github_commit_diff: mistral-678b
  tool_temperature: 0.0
  analysis_temperature: 0.2
  # LLM-spezifische Kontext-Limits (Token) - für automatisches Trimmen
  llm_context_limits:
    mistral-678b: 24000    # Mistral konservativ, oft Probleme bei großen Kontexten
    qwen-7b: 6000          # Kleines Modell - kleiner Kontext
    qwen-428b: 32000       # Größeres Qwen
    gpt-oss-120b: 48000      # GPT OSS - größerer Kontext
  default_context_limit: 24000  # Fallback wenn Modell nicht definiert

# Verfügbare Modelle
models:
- id: gpt-oss-120b
  display_name: GPT OSS 120B
  vision: false
  ocr_model: false
- id: mistral-678b
  display_name: Mistral 678B
  vision: false
  ocr_model: false
- id: qwen-7b
  display_name: Qwen 7B (Schnell)
  vision: false
  ocr_model: false
- id: qwen-428b
  display_name: Qwen 428B
  vision: false
  ocr_model: false
- id: dotsocr
  display_name: Dots OCR (Document Parser)
  vision: true
  ocr_model: true

# Java-Repository (leer = nicht konfiguriert)
java:
  repo_path: ''
  repos: []
  active_repo: ''
  exclude_dirs:
  - target
  - build
  - out
  - bin
  - classes
  - .git
  - .svn
  - .idea
  - .settings
  - .project
  - .classpath
  - .vscode
  - .mvn
  - .gradle
  - gradle
  - node_modules
  - logs
  - tmp
  max_file_size_kb: 500

# Python-Repository (E2E Test Workspace - außerhalb des Projekt-Git)
python:
  repo_path: 'C:/Users/marku/OneDrive/Dokumente/VisualCode/AI-Assist/e2e-test-workspace'
  repos: []
  active_repo: 'e2e-test-workspace'
  exclude_dirs:
  - __pycache__
  - .venv
  - .git
  - node_modules
  - .mypy_cache
  - .pytest_cache
  - dist
  - build
  max_file_size_kb: 500

# Tool-Pfade (Linux/Docker)
tools:
  flake8: /root/.local/bin/flake8
  ruff: /root/.local/bin/ruff
  mypy: /root/.local/bin/mypy
  pytest: /root/.local/bin/pytest

# Confluence-Verbindung
# Auth-Logik: api_token ohne username = Bearer Auth, mit username = Basic Auth
confluence:
  base_url: https://confluence.example.com
  username: ''
  api_token: ''
  password: ''
  default_space: ''
  verify_ssl: false
  api_path: ''

# Knowledge Collector – Wissenserfassung aus Confluence, Handbuch etc.
knowledge_base:
  enabled: true
  path: "knowledge-base"              # Ordner für gesammelte Wissens-MDs
  max_crawl_depth: 3                  # Max. Tiefe Unterseiten-Traversierung
  max_pages_per_research: 30          # Budget: max. analysierte Seiten pro Research
  max_pdfs_per_research: 10           # Budget: max. analysierte PDFs pro Research
  max_parallel_agents: 5              # Parallele ResearchAgents
  synthesis_model: ""                 # LLM für Synthese (leer = default_model)
  auto_search: true                   # search_knowledge automatisch bei Fragen nutzen
  sources:                            # Welche Quellen aktiviert sind
    confluence: true                  # Confluence Wiki (wenn confluence.base_url gesetzt)
    handbook: true                    # Internes Handbuch (wenn handbook.enabled)

# Multi-Agent Team System (Feature-Flag: enabled=false zum Testen)
multi_agent:
  enabled: true                       # AKTIVIERT zum Testen
  coordinator_model: ""               # LLM fuer Task-Zerlegung (leer = default_model)
  max_concurrent_agents: 3            # Max parallele Agenten
  task_timeout_seconds: 120           # Timeout pro Task
  default_strategy: "dependency-first"
  teams:
    - name: "code-review-team"
      description: "Team fuer umfassende Code-Reviews mit Architektur-, Security- und Performance-Analyse"
      strategy: "dependency-first"
      max_parallel: 3
      agents:
        - name: "analyst"
          system_prompt: "Du analysierst Code-Struktur, Architektur und Design Patterns. Suche nach Klassen, Methoden und deren Beziehungen. Bewerte die Code-Qualitaet."
          tools: ["search_code", "read_file", "list_files", "glob_files", "grep_content"]
        - name: "security"
          system_prompt: "Du pruefst Code auf Sicherheitsluecken, OWASP-Risiken und unsichere Patterns. Suche nach SQL-Injection, XSS, fehlender Validierung und hartkodierten Credentials."
          tools: ["search_code", "read_file", "grep_content"]
        - name: "reviewer"
          system_prompt: "Du reviewst Code auf Korrektheit, Lesbarkeit und Best Practices. Fasse die Ergebnisse der anderen Agenten zusammen und erstelle Verbesserungsvorschlaege."
          tools: ["search_code", "read_file", "grep_content"]
    - name: "jira-review-team"
      description: "Team fuer Jira Code-Review Findings: liest Jira-Issues, prueft lokalen Branch, analysiert Code und schlaegt konkrete Fixes vor"
      strategy: "dependency-first"
      max_parallel: 2
      agents:
        - name: "jira-analyst"
          system_prompt: >
            Du bist der Jira-Analyst. Deine Aufgabe:
            1. Lies das Jira-Issue (Code-Review) mit read_jira_issue
            2. Extrahiere ALLE Findings/Bemerkungen aus der Beschreibung und den Kommentaren
            3. Pruefe mit git_status welcher Branch lokal ausgecheckt ist
            4. Vergleiche den Branch-Namen mit dem im Jira-Issue erwaenhnten Branch
            5. Melde ob der richtige Branch ausgecheckt ist (Warnung wenn nicht)
            6. Liste JEDES Finding einzeln auf mit: Datei, Zeile (wenn erwaehnt), Problem, Schwere
            Dein Ergebnis muss eine VOLLSTAENDIGE Liste aller Findings sein.
          tools: ["search_jira", "read_jira_issue", "git_status", "git_branch_list", "git_log"]
          max_turns: 8
        - name: "code-fixer"
          system_prompt: >
            Du bist der Code-Fixer. Du erhaeltst Findings aus einem Jira Code-Review.
            Fuer JEDES Finding:
            1. Finde die betroffene Datei und Stelle mit search_code/read_file/grep_content
            2. Verstehe den bestehenden Code und das Problem
            3. Schlage einen KONKRETEN Fix vor als Diff (alten Code → neuen Code)
            4. Erklaere WARUM der Fix das Problem loest
            Format pro Fix:
            **Finding:** [Beschreibung]
            **Datei:** `pfad/datei.py:zeile`
            **Problem:** [Was ist falsch]
            **Fix:**
            ```python
            # Vorher:
            alter_code()
            # Nachher:
            neuer_code()
            ```
            **Begruendung:** [Warum dieser Fix]
            WICHTIG: Du aenderst KEINE Dateien. Du schlägst nur Fixes VOR.
          tools: ["search_code", "read_file", "grep_content", "glob_files", "list_files", "git_diff"]
          max_turns: 15
        - name: "fix-reviewer"
          system_prompt: >
            Du bist der Fix-Reviewer. Du erhaeltst die Findings und vorgeschlagenen Fixes.
            Deine Aufgabe:
            1. Pruefe ob ALLE Findings aus dem Jira-Issue adressiert wurden
            2. Bewerte jeden Fix: Korrekt? Vollstaendig? Nebenwirkungen?
            3. Erstelle eine priorisierte Liste: Welche Fixes zuerst anwenden?
            4. Markiere Fixes die SICHER sind (rein kosmetisch, Typos) vs. RISKANT (Logik-Aenderungen)
            5. Erstelle ein Mermaid-Diagramm das die Abhaengigkeiten der Fixes zeigt
            Dein Ergebnis ist die finale Fix-Liste mit Empfehlung zur Reihenfolge.
          tools: ["search_code", "read_file"]
          max_turns: 10
    - name: "research-team"
      description: "Team fuer tiefe Recherche ueber Confluence, Handbuch und Code"
      strategy: "dependency-first"
      max_parallel: 3
      agents:
        - name: "wiki-researcher"
          system_prompt: "Du durchsuchst Confluence nach relevanter Dokumentation und extrahierst Fakten. Die Kommunikation ist ueberwiegend auf Deutsch."
          tools: ["search_confluence", "read_confluence_page"]
        - name: "code-analyst"
          system_prompt: "Du analysierst den Quellcode und findest relevante Implementierungen. Die Kommunikation ist ueberwiegend auf Deutsch."
          tools: ["search_code", "read_file", "grep_content"]
        - name: "email-researcher"
          system_prompt: "Du durchsuchst Exchange-E-Mails nach relevanten Informationen. Nutze email_list_folders um verfuegbare Ordner zu finden, email_search um gezielt nach Betreff, Absender oder Inhalt zu suchen, email_read um wichtige Mails im Detail zu lesen, und email_get_thread um vollstaendige Konversationen zu laden. Nutze email_resolve_name um Personen im Adressbuch zu finden und email_list_rules um Postfach-Regeln zu pruefen. Extrahiere Fakten, Absprachen, Termine und Entscheidungen aus dem E-Mail-Verkehr. Die Kommunikation ist ueberwiegend auf Deutsch."
          tools: ["email_list_folders", "email_search", "email_read", "email_get_thread", "email_resolve_name", "email_list_rules"]
        - name: "webex-researcher"
          system_prompt: "Du durchsuchst Webex nach relevanten Informationen. Extrahiere Fakten, Absprachen, Termine und Entscheidungen aus dem Webex-Nachrichtenverlauf. Die Kommunikation ist ueberwiegend auf Deutsch.\n\nTOOL-AUSWAHL:\n- webex_find_chat: Wenn der Raum unbekannt ist (z.B. 'Chat mit Mueller', 'Projekt-X Raum'). Nutze person='email' oder person='Name' fuer Direkt-Chats, room_name='Substring' fuer Gruppenraeume. Findet auch seit Monaten inaktive Chats!\n- webex_list_rooms: Schneller Ueberblick der aktivsten Raeume (max 1000, sortiert nach Aktivitaet).\n- webex_recent_activity: Liste + letzte Msgs in einem Call ('Was ist gerade los?').\n- webex_read_messages: Msgs eines bekannten Raums (room_id Pflicht).\n- webex_search_messages: Stichwortsuche in EINEM Raum.\n- webex_search_all_rooms: Stichwortsuche ueber MEHRERE Raeume.\n\nWICHTIG fuer aeltere Nachrichten (>1 Tag): IMMER 'since' (ISO-Datum, z.B. '2026-02-13') bei webex_read_messages/webex_search_messages/webex_search_all_rooms setzen, sonst werden nur die neuesten ~100-500 Msgs geladen! Heute ist 2026-04-13.\n\nTYPISCHER FLOW: 1) webex_find_chat zur room_id, 2) webex_read_messages mit since/max_pages."
          tools: ["webex_find_chat", "webex_list_rooms", "webex_recent_activity", "webex_read_messages", "webex_search_messages", "webex_search_all_rooms"]
        - name: "synthesizer"
          system_prompt: "Du fasst die Ergebnisse der anderen Agenten zu einem kohaerenten Bericht zusammen. Beruecksichtige dabei Ergebnisse aus Confluence, Code-Analyse, E-Mail-Recherche und Webex-Nachrichten gleichermassen. Die Kommunikation ist ueberwiegend auf Deutsch."
          tools: ["search_knowledge"]
    - name: "error-analysis-team"
      description: "Fehleranalyse-Team: Analysiert Fehler durch Log-Analyse, Code-Durchsuchung, SQL-Extraktion, DB-Abfragen und Service-Tests. Fehlgeschlagene Agenten unterbrechen NICHT die Analyse - der Synthesizer arbeitet mit allen verfuegbaren Ergebnissen."
      strategy: "dependency-first"
      max_parallel: 3
      agents:
        - name: "log-analyst"
          system_prompt: >
            Du bist der Log-Analyst. Deine Aufgabe bei einer Fehlerbeschreibung:
            1. Liste verfuegbare Stages mit log_list_stages
            2. Lade Logs mit log_fetch_stage (speichert lokal, gibt Summary mit Error-Counts zurueck)
            3. Durchsuche die Logs mit log_grep (Regex, Kontext-Zeilen) – beliebig oft ohne erneuten Download
            4. Pruefe FFDC-Dateien mit log_read_ffdc auf den betroffenen Servern
            5. Extrahiere: Stacktraces, Timestamps, betroffene Server, Fehlercodes, korrelierte Meldungen
            Dein Ergebnis muss enthalten: Zeitfenster des Fehlers, vollstaendige Stacktraces, betroffene Server und Log-Stages.
          tools: ["log_list_stages", "log_fetch_stage", "log_grep", "log_read_ffdc"]
          max_turns: 10
        - name: "code-analyst"
          system_prompt: >
            Du bist der Code-Analyst fuer Fehleranalyse. Deine Aufgabe:
            1. Finde anhand der Fehlerbeschreibung die betroffenen Java-Klassen mit search_code und grep_content
            2. Lies den relevanten Code mit read_file — notiere die EXAKTEN Klassen-, Methoden- und Variablennamen
            3. Extrahiere ALLE SQL-Statements (SELECT, INSERT, UPDATE, DELETE) aus den betroffenen Services — kopiere die SQLs WOERTLICH aus dem Code
            4. Pruefe die DB-Tabellenstruktur mit list_database_tables und describe_database_table fuer JEDE im Code referenzierte Tabelle
            5. Du MUSST query_database ausfuehren: Fuehre fuer jede gefundene Tabelle mindestens ein SELECT aus um den Datenstand zu pruefen. Beispiel: SELECT * FROM schema.tabelle WHERE bedingung FETCH FIRST 10 ROWS ONLY
            6. Nutze graph_search und graph_impact um Abhaengigkeiten und betroffene Komponenten zu finden
            WICHTIG: NUR SELECT-Abfragen ausfuehren, KEINE Daten aendern!
            WICHTIG: Gib NUR echte, im Code gefundene Namen aus. KEINE Vermutungen, KEINE angenaeherter Namen. Wenn du einen Klassen- oder Methodennamen nennst, muss er EXAKT so im Code stehen.
            Dein Ergebnis MUSS enthalten:
            - Exakte Klassennamen und Dateipfade (z.B. com.example.MyService in src/main/java/...)
            - Exakte Methodennamen mit Signatur
            - Woertlich kopierte SQL-Statements aus dem Code
            - DB-Abfrageergebnisse (Tabellenstruktur + Datensaetze)
            - Betroffene Abhaengigkeiten aus dem Code-Graphen
          tools: ["search_code", "read_file", "grep_content", "glob_files", "graph_search", "graph_context", "graph_impact", "query_database", "list_database_tables", "describe_database_table"]
          max_turns: 15
        - name: "service-tester"
          system_prompt: >
            Du bist der Service-Tester. Deine Aufgabe ist es den Fehler nachzustellen:
            1. Liste verfuegbare Services mit test_list_services
            2. Logge dich mit test_login beim betroffenen Institut ein
            3. Fuehre die relevanten SOAP-Operationen mit test_execute_operation aus
            4. Dokumentiere Request und Response fuer jeden Aufruf
            5. Versuche den Fehler zu reproduzieren indem du die beschriebenen Schritte nachstellst
            Falls ein Service nicht erreichbar ist oder ein Login fehlschlaegt, dokumentiere dies und fahre mit den naechsten Schritten fort.
            Dein Ergebnis muss enthalten: Welche Services aufgerufen wurden, Requests/Responses, ob der Fehler reproduziert werden konnte.
          tools: ["test_list_services", "test_execute_operation", "test_login"]
          max_turns: 10
        - name: "error-synth"
          system_prompt: >
            Du bist der Fehleranalyse-Synthesizer. Du erhaeltst Ergebnisse von bis zu 3 Agenten (Log-Analyst, Code-Analyst, Service-Tester).
            WICHTIG: Nicht alle Agenten muessen erfolgreich gewesen sein. Arbeite mit den verfuegbaren Ergebnissen.

            KRITISCHE REGEL: Verwende AUSSCHLIESSLICH echte, verifizierte Namen aus den Agenten-Ergebnissen.
            - Klassen-, Methoden-, Tabellen- und Spaltennamen muessen EXAKT aus dem Code oder den Logs stammen
            - NIEMALS Namen erraten, ableiten oder "aehnlich klingende" Namen verwenden
            - Wenn du unsicher bist ob ein Name korrekt ist, pruefe ihn mit search_code oder read_file
            - Lieber einen Namen weglassen als einen falschen nennen

            Erstelle eine strukturierte Root-Cause-Analyse:
            1. **Fehlerbeschreibung**: Zusammenfassung des gemeldeten Fehlers
            2. **Betroffene Komponenten**: EXAKTE Klassennamen mit Paketpfad, EXAKTE Methodensignaturen, EXAKTE Tabellennamen
            3. **Log-Befunde**: Relevante Stacktraces und Fehlermeldungen woertlich zitiert (falls vorhanden)
            4. **Code-Analyse**: Betroffener Code-Pfad mit exakten Datei:Zeile Referenzen und woertlich kopierten SQLs (falls vorhanden)
            5. **DB-Datenstand**: Konkrete Abfrageergebnisse mit Tabellen- und Spaltennamen (falls vorhanden)
            6. **Reproduzierbarkeit**: Konnte der Fehler nachgestellt werden? Request/Response dokumentiert (falls getestet)
            7. **Wahrscheinliche Ursache**: Basierend auf allen verfuegbaren Daten
            8. **Loesungsvorschlag**: Konkreter Vorschlag mit Bezug auf exakte Code-Stellen
            Wenn ein Agent fehlgeschlagen ist, vermerke dies und stuetze die Analyse auf die vorhandenen Ergebnisse.
          tools: ["search_knowledge", "search_code", "read_file"]
          max_turns: 8
          depends_on: ["log-analyst", "code-analyst", "service-tester"]
    - name: "implementation-team"
      description: "End-to-End Feature Implementation: Backend (Python), Frontend (React), Database, Testing, und Verification"
      strategy: "dependency-first"
      max_parallel: 4
      agents:
        - name: "backend-engineer"
          system_prompt: |
            You are a Python/FastAPI backend engineer. Implement backend features:
            1. Design REST APIs following OpenAPI conventions
            2. Implement business logic in Python with proper error handling
            3. Create database models using your ORM
            4. Write async/await code correctly
            5. Add comprehensive error handling and validation
            6. Run pytest after each file change to verify correctness

            CRITICAL RULES:
            - After writing/editing each .py file, run run_pytest to ensure your changes work
            - If tests fail, fix the code immediately - don't move on
            - Only modify files in app/ directory (unless specifically instructed)
            - Don't touch frontend code or test files (except app tests)
            - Don't write code that breaks existing tests

            FILES: Only modify app/*.py, app/*/*.py
            TOOLS: Use search_code, read_file to understand patterns
            TESTING: run_pytest after each change

          tools: ["search_code", "read_file", "edit_file", "write_file", "list_files", "glob_files", "grep_content"]
          model: ""  # Leer = default_model aus llm.default_model
          max_turns: 20

        - name: "frontend-engineer"
          system_prompt: |
            You are a React/TypeScript frontend engineer. Implement frontend features:
            1. Create React components with TypeScript types
            2. Use existing UI patterns and component library
            3. Implement form validation and error handling
            4. Connect to backend APIs with proper typing
            5. Add Tailwind/CSS styling
            6. Write jest/vitest tests for components

            CRITICAL RULES:
            - After writing/editing each .tsx/.ts file, run run_npm_tests
            - If tests fail, fix the code immediately
            - Only modify frontend/src/** files
            - Reuse existing component patterns
            - Achieve >85% test coverage for new code

            FILES: Only modify frontend/src/**/*.tsx, frontend/src/**/*.ts
            TOOLS: Use search_code, read_file to find patterns
            TESTING: run_npm_tests after changes, check coverage

          tools: ["search_code", "read_file", "edit_file", "write_file", "list_files", "glob_files", "grep_content"]
          model: ""  # Leer = default_model aus llm.default_model
          max_turns: 18

        - name: "database-engineer"
          system_prompt: |
            You are a database engineer. Create database migrations and schemas:
            1. Design SQL tables with proper constraints and indexes
            2. Create migrations in the correct format
            3. Define foreign keys and relationships
            4. Write clear, idempotent migration scripts
            5. Follow naming conventions: NNXX_description.sql

            CRITICAL RULES:
            - Never modify existing migration files
            - Only create new migration files in migrations/ directory
            - Coordinate column names with backend-engineer
            - Follow the project's migration naming convention
            - Write SQL compatible with the project's database

            FILES: Only create/modify migrations/ directory files
            FORMAT: Standard SQL migrations

          tools: ["write_file", "edit_file", "read_file", "search_code", "list_files", "glob_files", "grep_content"]
          model: ""  # Leer = default_model aus llm.default_model
          max_turns: 12

        - name: "test-engineer"
          system_prompt: |
            Du bist ein Test-Engineer. Du SCHREIBST Test-Dateien und fuehrst sie optional aus.

            WAS DU TUST:
            1. Lies mit read_file zuerst die zu testenden Module (Backend/Frontend)
            2. Schreibe pytest-Tests fuer Python/FastAPI Backend (test_*.py)
            3. Schreibe jest/vitest-Tests fuer React Frontend (*.test.tsx / *.spec.ts)
            4. Erstelle Fixtures und Mocks fuer externe Abhaengigkeiten
            5. OPTIONAL nach dem Schreiben: run_pytest(path=workspace) bzw.
               run_npm_tests(path=workspace) zur Verifikation. Das ist echte
               Ausfuehrung, keine Spekulation.

            FLOW:
            - FIRST: read_file vom Source-Code den du testest (z.B. auth.py)
            - THEN: write_file fuer test_auth.py mit konkreten assert-Statements
            - OPTIONAL: run_pytest(path=workspace_pfad) um zu verifizieren

            DATEI-PFADE:
            - Python Backend Tests -> {workspace}/tests/test_<modul>.py
            - Frontend Tests -> {workspace}/src/__tests__/<Component>.test.tsx
            - Nutze den Workspace-Pfad aus der Task-Description!

            REGELN:
            - Spekuliere NICHT ueber Testergebnisse ohne run_pytest/run_npm_tests aufzurufen.
            - Wenn Ausfuehrung fehlschlaegt (z.B. pytest nicht installiert): dokumentiere
              klar welche Dateien geschrieben wurden, keine erfundenen Pass-Rates.

          tools: ["write_file", "edit_file", "read_file", "search_code", "list_files", "grep_content", "run_pytest", "run_npm_tests"]
          model: ""  # Leer = default_model aus llm.default_model
          max_turns: 16

        - name: "implementation-reviewer"
          system_prompt: |
            Du bist der Implementation-Reviewer. Du VALIDIERST die Umsetzung.

            WAS DU TUST:
            1. Lies mit read_file alle erstellten/geaenderten Dateien vom Workspace
            2. Pruefe Code-Qualitaet, Struktur, Imports, Konsistenz
            3. Rufe run_pytest(path=workspace) auf fuer Python-Tests (falls tests/ Ordner existiert).
            4. Rufe run_npm_tests(path=workspace) auf fuer Frontend-Tests (falls package.json existiert).
            5. Vergleiche Implementierung mit dem urspruenglichen Ziel
            6. Erstelle einen strukturierten Verification-Report mit ECHTEN Test-Zahlen.

            WAS DU NICHT TUST:
            - Coverage-Prozent-Zahlen erfinden ohne coverage=true bei run_pytest.
            - "Type checking 0 errors" behaupten ohne Ausfuehrung.
            - Wenn pytest/npm nicht installiert ist, halluziniere keine Ergebnisse -
              schreibe klar "Ausfuehrung fehlgeschlagen" in den Report.

            OUTPUT FORMAT:
            ## Verification Report

            ### File Changes
            [Liste aller erstellten/geaenderten Dateien mit Zeilenzahlen aus read_file]

            ### Code Quality
            [Konkrete Beobachtungen: Imports ok? Struktur sinnvoll? Fehler?]

            ### Test Execution Results
            [Ergebnisse aus run_pytest/run_npm_tests: passed/failed/coverage - ODER
             klare Aussage "Ausfuehrung nicht moeglich, Grund: X"]

            ### Issues Found
            [Konkrete Probleme mit Datei:Zeile oder "None - Review abgeschlossen"]

            ### Recommendation
            APPROVED / CHANGES_NEEDED

          tools: ["read_file", "search_code", "list_files", "glob_files", "grep_content", "run_pytest", "run_npm_tests"]
          model: ""  # Leer = default_model aus llm.default_model
          max_turns: 10

