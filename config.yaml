# Globale Proxy-Konfiguration (für alle externen HTTP-Verbindungen)
proxy:
  enabled: false
  url: ''                # z.B. http://proxy.intern:8080
  username: ''
  password: ''
  no_proxy: ''           # Kommagetrennte Liste ohne Proxy, z.B. "localhost,127.0.0.1,.intern"
  verify_ssl: true

# ═══════════════════════════════════════════════════════════════════
# LLM-Verbindung (OpenAI-kompatibler Endpunkt)
# ═══════════════════════════════════════════════════════════════════
# SETUP für LLM-Test-Proxy:
#   1. LLM-Test-Proxy starten: cd ../LLM-Test-Proxy && uvicorn app.main:app --port 8080
#   2. AI-Assist starten:      cd AI-Assist && uvicorn app.main:app --port 8000
#   3. Dashboard:              http://localhost:8080/dashboard
#
# Der Proxy mappt AI-Assist Modelle auf OpenAI (siehe LLM-Test-Proxy/config.yaml):
#   gptoss120b   → gpt-4o-mini
#   mistral-678b → gpt-4o-mini
#   qwen-7b      → gpt-4o-mini
# ═══════════════════════════════════════════════════════════════════
llm:
  base_url: http://localhost:8080/v1  # LLM-Test-Proxy (Port 8080) → OpenAI
  api_key: none  # Proxy verwendet eigenen OpenAI Key aus .env
  default_model: gptoss120b
  timeout_seconds: 120
  max_tokens: 4096
  temperature: 0.2
  verify_ssl: false
  streaming: true
  tool_model: qwen-7b
  analysis_model: mistral-678b
  tool_models:
    search_code: qwen-7b
    list_files: qwen-7b
    read_file: qwen-7b
    search_handbook: qwen-7b
    write_file: mistral-678b
    edit_file: mistral-678b
    github_pr_diff: mistral-678b
    github_commit_diff: mistral-678b
  tool_temperature: 0.0
  analysis_temperature: 0.2
  # LLM-spezifische Kontext-Limits (Token) - für automatisches Trimmen
  llm_context_limits:
    mistral-678b: 24000    # Mistral konservativ, oft Probleme bei großen Kontexten
    qwen-7b: 6000          # Kleines Modell - kleiner Kontext
    qwen-428b: 32000       # Größeres Qwen
    gptoss120b: 48000      # GPT OSS - größerer Kontext
  default_context_limit: 24000  # Fallback wenn Modell nicht definiert

# Verfügbare Modelle
models:
- id: gptoss120b
  display_name: GPT OSS 120B
- id: mistral-678b
  display_name: Mistral 678B
- id: qwen-7b
  display_name: Qwen 7B (Schnell)
- id: qwen-428b
  display_name: Qwen 428B

