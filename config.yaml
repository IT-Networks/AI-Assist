llm:
  base_url: "http://internal-llm-gateway/v1"
  api_key: "none"
  default_model: "gptoss120b"
  timeout_seconds: 120
  max_tokens: 4096
  temperature: 0.2
  verify_ssl: false  # false für selbstsignierte Zertifikate (interne Server)
  streaming: true    # true für Token-Streaming bei Antworten

  # ═══════════════════════════════════════════════════════════════════
  # Modell-Strategie für große Codebases
  # ═══════════════════════════════════════════════════════════════════

  # Phase-spezifische Modelle
  tool_model: "qwen-7b"          # Schnell für Suche/Navigation/Tool-Calls
  analysis_model: "mistral-678b" # Groß für finale Analyse & Code-Generierung

  # Pro-Tool Modell-Zuweisung (überschreibt tool_model für spezifische Tools)
  tool_models:
    # Lese-Operationen: Schnelles Modell reicht
    search_code: "qwen-7b"
    list_files: "qwen-7b"
    read_file: "qwen-7b"
    search_handbook: "qwen-7b"

    # Schreib-Operationen: Qualität wichtig
    write_file: "mistral-678b"
    edit_file: "mistral-678b"

    # Code-Review: Qualität wichtig
    github_pr_diff: "mistral-678b"
    github_commit_diff: "mistral-678b"

  # Phase-spezifische Temperature
  tool_temperature: 0.0        # Tool-Calls: deterministisch (gleiche Suche = gleiche Ergebnisse)
  analysis_temperature: 0.2    # Analyse: etwas Kreativität für Code-Lösungen

models:
  - id: "gptoss120b"
    display_name: "GPT OSS 120B"
  - id: "mistral-678b"
    display_name: "Mistral 678B"
  - id: "qwen-7b"
    display_name: "Qwen 7B (Schnell)"
  - id: "qwen-428b"
    display_name: "Qwen 428B"

java:
  # Mehrere Repos möglich - nur eines aktiv
  repos:
    - name: "Beispiel-Projekt"
      path: "/home/user/projects/my-java-app"
  active_repo: "Beispiel-Projekt"  # Name des aktiven Repos
  repo_path: "/home/user/projects/my-java-app"  # Legacy-Kompatibilität
  exclude_dirs:
    # Build-Output
    - "target"
    - "build"
    - "out"
    - "bin"
    - "classes"
    # Version Control
    - ".git"
    - ".svn"
    # IDE-spezifisch (IntelliJ, Eclipse, VS Code)
    - ".idea"
    - ".settings"
    - ".project"
    - ".classpath"
    - ".vscode"
    # Maven/Gradle
    - ".mvn"
    - ".gradle"
    - "gradle"
    # Sonstige
    - "node_modules"
    - "logs"
    - "tmp"
  max_file_size_kb: 500

confluence:
  base_url: "https://confluence.example.com"
  username: ""
  api_token: ""       # Atlassian Cloud: API-Token hier eintragen
  password: ""        # Atlassian Server/DC: Passwort hier (statt api_token)
  default_space: ""
  verify_ssl: false   # false für selbstsignierte Zertifikate (interne Server)

jira:
  enabled: false
  base_url: "https://jira.example.com"
  username: ""
  api_token: ""       # Atlassian Cloud: API-Token hier eintragen
  password: ""        # Atlassian Server/DC: Passwort hier (statt api_token)
  default_project: ""
  verify_ssl: false   # false für selbstsignierte Zertifikate (interne Server)

context:
  max_tokens: 64000            # Erhöht für große Codebases
  max_file_context_kb: 200     # Größere Dateien erlauben

uploads:
  directory: "./uploads"
  max_file_size_mb: 50
  cleanup_after_hours: 24

index:
  directory: "./index"          # Speicherort für SQLite FTS5-Indexe
  auto_build_on_start: false    # Java-Index beim App-Start automatisch aufbauen
  max_search_results: 5         # Anzahl relevanter Treffer pro Suche

python:
  repo_path: ""                 # PYTHON_REPO_PATH env var möglich
  exclude_dirs:
    - "__pycache__"
    - ".venv"
    - ".git"
    - "node_modules"
    - ".mypy_cache"
    - ".pytest_cache"
    - "dist"
    - "build"
  max_file_size_kb: 500

tools:
  flake8: "/root/.local/bin/flake8"
  ruff: "/root/.local/bin/ruff"
  mypy: "/root/.local/bin/mypy"
  pytest: "/root/.local/bin/pytest"

server:
  host: "0.0.0.0"
  port: 8000
  reload: false

# ═══════════════════════════════════════════════════════════════════
# NEUE FEATURES: AI-Assist Evolution
# ═══════════════════════════════════════════════════════════════════

# Handbuch-Integration (HTML auf Netzlaufwerk)
handbook:
  enabled: false                           # true um Handbuch zu aktivieren
  path: ""                                 # z.B. "//server/share/handbuch" oder "Z:/handbuch"
  index_on_start: false                    # Automatisch beim Start indexieren
  exclude_patterns:
    - "**/archiv/**"
    - "**/backup/**"
    - "**/.git/**"
  functions_subdir: "funktionen"           # Subordner für Service-Funktionen
  fields_subdir: "felder"                  # Subordner für Feld-Definitionen

# Skill-System
skills:
  enabled: true
  directory: "./skills"                    # Ordner für Skill-Definitionen (YAML)
  auto_activation: false                   # Automatische Aktivierung basierend auf Keywords
  max_active_skills: 5                     # Max. gleichzeitig aktive Skills

# Datei-Operationen (Read/Write/Edit wie Claude Code)
file_operations:
  enabled: false                           # true um Schreibzugriff zu erlauben
  default_mode: "read_only"                # read_only | write_with_confirm
  allowed_paths: []                        # Pfade in denen geschrieben werden darf
  allowed_extensions:
    # Java-Dateien
    - ".java"
    - ".sqlj"
    - ".jspx"
    - ".jsp"
    # Konfiguration
    - ".xml"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".properties"
    - ".cfg"
    - ".conf"
    # Build-Dateien
    - ".gradle"
    - ".kts"             # Kotlin DSL für Gradle
    # Web
    - ".html"
    - ".htm"
    - ".css"
    - ".js"
    - ".ts"
    # Datenbank
    - ".sql"
    - ".ddl"
    # Dokumentation
    - ".md"
    - ".txt"
    - ".adoc"            # AsciiDoc
    # Python
    - ".py"
    # Sonstige
    - ".sh"
    - ".bat"
    - ".cmd"
  denied_patterns:
    # Dependencies & Build-Output
    - "**/node_modules/**"
    - "**/target/**"
    - "**/build/**"
    - "**/out/**"
    - "**/bin/**"
    - "**/__pycache__/**"
    - "**/.gradle/**"
    # Version Control
    - "**/.git/**"
    - "**/.svn/**"
    # IDE-Metadaten
    - "**/.idea/**"
    - "**/.settings/**"
    - "**/.vscode/**"
    # Logs & Temporär
    - "**/logs/**"
    - "**/tmp/**"
    - "**/*.log"
    # Sensible Dateien
    - "**/*.key"
    - "**/*.pem"
    - "**/*.jks"
    - "**/secrets/**"
  backup_enabled: true
  backup_directory: "./backups"

# DB2-Datenbankverbindung
database:
  enabled: false                           # true um DB-Abfragen zu aktivieren
  driver: "ibm_db"                         # ibm_db (native) oder jaydebeapi (JDBC)
  host: ""                                 # Hostname des DB2-Servers
  port: 50000                              # Standard DB2-Port
  database: ""                             # Datenbankname
  db_schema: ""                            # Standard-Schema (z.B. CREATOR bei z/OS)
  username: ""
  password: ""
  # Sicherheit
  require_confirmation: true               # Bestätigung vor jeder Query
  max_rows: 1000                           # Max. Zeilen pro Abfrage
  timeout_seconds: 30
  readonly: true                           # Nur SELECT erlaubt
  # Für JDBC (jaydebeapi)
  jdbc_driver_path: ""                     # Pfad zur db2jcc4.jar
  jdbc_driver_class: "com.ibm.db2.jcc.DB2Driver"

# Sub-Agenten für parallele Codebase-Exploration
sub_agents:
  enabled: true
  timeout_seconds: 120           # 2 Min für komplexe Suchen (große Codebases)
  max_iterations: 15             # Mehr Tool-Calls pro Sub-Agent
  min_query_length: 10           # Kürzere Queries auch verarbeiten
  routing_model: "qwen-7b"       # Schnelles Modell für Intent-Routing
  agents:
    - "code_explorer"            # Java/Python Code-Suche
    - "wiki_agent"               # Confluence-Suche
    - "knowledge_agent"          # Handbuch/Skills-Suche
    - "datasource_agent"         # Interne HTTP-APIs

# ═══════════════════════════════════════════════════════════════════
# WLP (WebSphere Liberty Profile) - Lokaler App-Server
# ═══════════════════════════════════════════════════════════════════
wlp:
  enabled: false
  java_home: ""                            # JAVA_HOME für WLP (leer = System-Default)
  # Mehrere Server möglich
  servers:
    - id: "local-dev"
      name: "Lokaler Entwicklungsserver"
      description: "WLP für lokale Entwicklung und Tests"
      wlp_path: ""                         # z.B. "C:/wlp" oder "/opt/wlp"
      server_name: "defaultServer"         # Name des Liberty-Servers
      start_timeout_seconds: 300           # Max. Zeit für Server-Start
      extra_jvm_args: ""                   # z.B. "-Xmx1024m -Xms512m"
    # Beispiel für weiteren Server:
    # - id: "integration"
    #   name: "Integration Server"
    #   wlp_path: "C:/wlp-integration"
    #   server_name: "integrationServer"
  repo_path: ""                            # Java-Repo für Artefakt-Prüfung (leer = java.get_active_path())

# ═══════════════════════════════════════════════════════════════════
# Maven Build - Build-Automatisierung
# ═══════════════════════════════════════════════════════════════════
maven:
  enabled: false
  mvn_executable: "mvn"                    # Pfad zum Maven-Binary (z.B. "C:/maven/bin/mvn.cmd")
  java_home: ""                            # JAVA_HOME für Maven (leer = System-Default)
  settings_file: ""                        # User Settings (leer = ~/.m2/settings.xml)
  local_repo: ""                           # Lokales Repository (leer = ~/.m2/repository)
  default_timeout_minutes: 15              # Build-Timeout
  # Vordefinierte Builds (für schnellen Zugriff)
  builds:
    - id: "full-build"
      name: "Vollständiger Build"
      description: "Clean + Install mit allen Tests"
      pom_path: ""                         # Relativ zum aktiven Java-Repo oder absolut
      goals: "clean install"
      profiles: []                         # z.B. ["dev", "local"]
      skip_tests: false
      jvm_args: "-Xmx1024m"
      extra_args: ""                       # z.B. "-DskipITs" für Integration-Tests überspringen
    - id: "quick-build"
      name: "Schneller Build"
      description: "Compile ohne Tests (für schnelle Iterationen)"
      pom_path: ""
      goals: "clean compile"
      profiles: []
      skip_tests: true
      jvm_args: "-Xmx512m"
      extra_args: ""
    - id: "package-only"
      name: "Nur Paketieren"
      description: "Package ohne Clean (für Deployment)"
      pom_path: ""
      goals: "package"
      profiles: []
      skip_tests: true
      jvm_args: "-Xmx1024m"
      extra_args: "-Dmaven.test.skip=true"

# ═══════════════════════════════════════════════════════════════════
# MCP (Model Context Protocol) - Lokale Implementation
# ═══════════════════════════════════════════════════════════════════
mcp:
  enabled: false                           # true um MCP zu aktivieren
  servers: []                              # Lokale MCP-Server (stdio-basiert)
    # Beispiel:
    # - id: "seq-thinking"
    #   name: "Sequential Thinking"
    #   description: "Strukturiertes Denken für komplexe Aufgaben"
    #   command: "python"
    #   args: ["-m", "mcp_server_seq"]
    #   timeout_seconds: 60
    #   auto_start: true
  # Sequential Thinking (lokale Implementation ohne externen Server)
  sequential_thinking_enabled: true        # Lokale Seq-Thinking Implementation
  max_thinking_steps: 15                   # Max. Denkschritte pro Anfrage (erhöht für Planung)
  thinking_timeout_seconds: 180            # 3 Min für komplexe Planungsaufgaben
  # Automatische Aktivierung
  auto_activate_on_error: true             # Bei komplexen Fehlern
  auto_activate_on_planning: true          # Bei Planungsaufgaben
  min_complexity_score: 0.7                # Schwelle für Auto-Aktivierung (0.0-1.0)
  debug_logging: false
